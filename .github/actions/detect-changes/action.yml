name: 'Detect Changes'
description: 'Detect which services and libraries have changed in the monorepo'

inputs:
  base-ref:
    description: 'Base ref for comparison (default: origin/main for PRs)'
    required: false
    default: ''
  force-all:
    description: 'Force full rebuild (all services and libraries)'
    required: false
    default: 'false'

outputs:
  services:
    description: 'JSON array of changed services'
    value: ${{ steps.detect.outputs.services }}
  libraries:
    description: 'JSON array of changed libraries'
    value: ${{ steps.detect.outputs.libraries }}
  has-service-changes:
    description: 'Whether any services changed'
    value: ${{ steps.detect.outputs.has_service_changes }}
  has-library-changes:
    description: 'Whether any libraries changed'
    value: ${{ steps.detect.outputs.has_library_changes }}
  has-ui-changes:
    description: 'Whether atlas-ui changed'
    value: ${{ steps.detect.outputs.has_ui_changes }}
  has-go-workspace-changes:
    description: 'Whether go.work changed (triggers all Go builds)'
    value: ${{ steps.detect.outputs.has_go_workspace_changes }}
  has-workflow-changes:
    description: 'Whether .github workflows changed'
    value: ${{ steps.detect.outputs.has_workflow_changes }}
  all-go-services:
    description: 'JSON array of all Go services (for full rebuilds)'
    value: ${{ steps.detect.outputs.all_go_services }}
  all-go-libraries:
    description: 'JSON array of all Go libraries (for full rebuilds)'
    value: ${{ steps.detect.outputs.all_go_libraries }}
  go-services-matrix:
    description: 'JSON array of Go services to test/build'
    value: ${{ steps.affected.outputs.go-services }}
  go-libraries-matrix:
    description: 'JSON array of Go libraries to test'
    value: ${{ steps.affected.outputs.go-libraries }}
  docker-services-matrix:
    description: 'JSON array of services to build Docker images for'
    value: ${{ steps.affected.outputs.docker-services }}
  selection-reason:
    description: 'Human-readable reason for the selection'
    value: ${{ steps.affected.outputs.reason }}

runs:
  using: 'composite'
  steps:
    - name: Fetch base branch for comparison
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch origin ${{ github.base_ref }} --depth=1
        else
          # For push events, fetch the exact "before" SHA from the push payload.
          # HEAD~1 is unreliable when pushes land in rapid succession: the ref
          # may have advanced between the push and when checkout ran, and
          # a second push's parent isn't reachable from the first push's HEAD.
          BEFORE="${{ github.event.before }}"
          ZERO="0000000000000000000000000000000000000000"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ]; then
            git fetch origin "$BEFORE" --depth=1 || \
              echo "Warning: could not fetch before-SHA $BEFORE; will fall back to HEAD~1"
          fi
        fi

    - name: Detect changed files and services
      id: detect
      shell: bash
      run: |
        # Determine base ref for comparison
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        elif [ -n "${{ inputs.base-ref }}" ]; then
          BASE_REF="${{ inputs.base-ref }}"
        else
          # Prefer the push payload's "before" SHA over HEAD~1. HEAD~1 assumes
          # the checkout landed on the push's "after" SHA, which is racy when
          # main advances between the push event and the runner starting.
          BEFORE="${{ github.event.before }}"
          ZERO="0000000000000000000000000000000000000000"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ] && git cat-file -e "$BEFORE" 2>/dev/null; then
            BASE_REF="$BEFORE"
          else
            BASE_REF="HEAD~1"
          fi
        fi

        echo "Comparing against: $BASE_REF"

        # Get list of changed files
        CHANGED_FILES=$(git diff --name-only $BASE_REF HEAD 2>/dev/null || echo "")
        echo "Changed files:"
        echo "$CHANGED_FILES"

        # Initialize arrays
        CHANGED_SERVICES=()
        CHANGED_LIBRARIES=()

        # Check for global triggers
        HAS_GO_WORKSPACE_CHANGES="false"
        HAS_WORKFLOW_CHANGES="false"
        HAS_UI_CHANGES="false"

        if echo "$CHANGED_FILES" | grep -q "^go\.work"; then
          HAS_GO_WORKSPACE_CHANGES="true"
          echo "go.work changed - will trigger all Go builds"
        fi

        if echo "$CHANGED_FILES" | grep -q "^\.github/"; then
          HAS_WORKFLOW_CHANGES="true"
          echo ".github changed - will trigger all builds"
        fi

        # Detect changed services
        while IFS= read -r file; do
          if [[ "$file" =~ ^services/([^/]+)/ ]]; then
            SERVICE="${BASH_REMATCH[1]}"
            if [[ ! " ${CHANGED_SERVICES[*]} " =~ " ${SERVICE} " ]]; then
              CHANGED_SERVICES+=("$SERVICE")
              if [[ "$SERVICE" == "atlas-ui" ]]; then
                HAS_UI_CHANGES="true"
              fi
            fi
          fi
        done <<< "$CHANGED_FILES"

        # Detect changed libraries
        while IFS= read -r file; do
          if [[ "$file" =~ ^libs/([^/]+)/ ]]; then
            LIBRARY="${BASH_REMATCH[1]}"
            if [[ ! " ${CHANGED_LIBRARIES[*]} " =~ " ${LIBRARY} " ]]; then
              CHANGED_LIBRARIES+=("$LIBRARY")
            fi
          fi
        done <<< "$CHANGED_FILES"

        # Build all services/libraries lists (for full rebuilds)
        ALL_GO_SERVICES=()
        for dir in services/atlas-*/; do
          SERVICE=$(basename "$dir")
          if [[ "$SERVICE" != "atlas-ui" ]]; then
            ALL_GO_SERVICES+=("$SERVICE")
          fi
        done

        ALL_GO_LIBRARIES=()
        for dir in libs/atlas-*/; do
          LIBRARY=$(basename "$dir")
          ALL_GO_LIBRARIES+=("$LIBRARY")
        done

        # Convert arrays to JSON (compact, single-line format required for GITHUB_OUTPUT)
        services_json=$(printf '%s\n' "${CHANGED_SERVICES[@]}" | jq -R . | jq -sc .)
        libraries_json=$(printf '%s\n' "${CHANGED_LIBRARIES[@]}" | jq -R . | jq -sc .)
        all_go_services_json=$(printf '%s\n' "${ALL_GO_SERVICES[@]}" | jq -R . | jq -sc .)
        all_go_libraries_json=$(printf '%s\n' "${ALL_GO_LIBRARIES[@]}" | jq -R . | jq -sc .)

        # Handle empty arrays
        if [ ${#CHANGED_SERVICES[@]} -eq 0 ]; then
          services_json="[]"
        fi
        if [ ${#CHANGED_LIBRARIES[@]} -eq 0 ]; then
          libraries_json="[]"
        fi

        # Set outputs
        echo "services=$services_json" >> $GITHUB_OUTPUT
        echo "libraries=$libraries_json" >> $GITHUB_OUTPUT
        echo "all_go_services=$all_go_services_json" >> $GITHUB_OUTPUT
        echo "all_go_libraries=$all_go_libraries_json" >> $GITHUB_OUTPUT
        echo "has_service_changes=$( [ ${#CHANGED_SERVICES[@]} -gt 0 ] && echo 'true' || echo 'false' )" >> $GITHUB_OUTPUT
        echo "has_library_changes=$( [ ${#CHANGED_LIBRARIES[@]} -gt 0 ] && echo 'true' || echo 'false' )" >> $GITHUB_OUTPUT
        echo "has_ui_changes=$HAS_UI_CHANGES" >> $GITHUB_OUTPUT
        echo "has_go_workspace_changes=$HAS_GO_WORKSPACE_CHANGES" >> $GITHUB_OUTPUT
        echo "has_workflow_changes=$HAS_WORKFLOW_CHANGES" >> $GITHUB_OUTPUT

        # Summary
        echo ""
        echo "=== Detection Summary ==="
        echo "Changed services: ${CHANGED_SERVICES[*]:-none}"
        echo "Changed libraries: ${CHANGED_LIBRARIES[*]:-none}"
        echo "UI changes: $HAS_UI_CHANGES"
        echo "Go workspace changes: $HAS_GO_WORKSPACE_CHANGES"
        echo "Workflow changes: $HAS_WORKFLOW_CHANGES"

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.5'
        cache: false

    - name: Compute affected modules
      id: affected
      shell: bash
      run: |
        set -eo pipefail

        CHANGED_LIBS=$(echo '${{ steps.detect.outputs.libraries }}' | jq -r '. // [] | join(",")')
        CHANGED_SERVICES=$(echo '${{ steps.detect.outputs.services }}' | jq -r '. // [] | join(",")')

        FORCE_FLAGS=""
        if [ "${{ steps.detect.outputs.has_go_workspace_changes }}" = "true" ] \
          || [ "${{ steps.detect.outputs.has_workflow_changes }}" = "true" ] \
          || [ "${{ inputs.force-all }}" = "true" ]; then
          FORCE_FLAGS="--force-all"
          echo "force-all triggered by: go.work=${{ steps.detect.outputs.has_go_workspace_changes }} workflow=${{ steps.detect.outputs.has_workflow_changes }} input=${{ inputs.force-all }}"
        fi

        CONFIG=".github/config/services.json"

        if OUT=$(go run ./tools/cideps \
            --changed-libs="$CHANGED_LIBS" \
            --changed-services="$CHANGED_SERVICES" \
            --config="$CONFIG" \
            $FORCE_FLAGS 2>cideps.err); then
          echo "$OUT" > affected.json
          echo "go-services=$(jq -c '."go-services"' affected.json)" >> $GITHUB_OUTPUT
          echo "go-libraries=$(jq -c '."go-libraries"' affected.json)" >> $GITHUB_OUTPUT
          echo "docker-services=$(jq -c '."docker-services"' affected.json)" >> $GITHUB_OUTPUT
          REASON=$(jq -r '.reason' affected.json)
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          if [ -s cideps.err ]; then
            echo "::warning::cideps emitted warnings:"
            cat cideps.err
          fi
          {
            echo "### Affected modules";
            echo "$REASON";
            echo "";
            echo "- **Services**: $(jq -r '."go-services" | length' affected.json)";
            echo "- **Libraries**: $(jq -r '."go-libraries" | length' affected.json)";
            echo "- **Docker builds**: $(jq -r '."docker-services" | length' affected.json)";
          } >> "$GITHUB_STEP_SUMMARY"
        else
          echo "::warning::cideps failed with exit code $?, falling back to build-all"
          echo "cideps stderr:"
          cat cideps.err
          # Fallback: emit full matrices directly from services.json.
          echo "go-services=$(jq -c '[.services[] | select(.type == "go-service") | {name, path, module_path, docker_image}]' "$CONFIG")" >> $GITHUB_OUTPUT
          echo "go-libraries=$(jq -c '[.libraries[] | {name, path, module_path, coverage_threshold: (.coverage_threshold // 0)}]' "$CONFIG")" >> $GITHUB_OUTPUT
          echo "docker-services=$(jq -c '[.services[] | select(.docker_image != null) | {name, path, docker_context: (.docker_context // .path), docker_image}]' "$CONFIG")" >> $GITHUB_OUTPUT
          echo "reason=cideps failed; fell back to build-all" >> $GITHUB_OUTPUT
          {
            echo "### Affected modules";
            echo "cideps FAILED — fell back to full rebuild";
          } >> "$GITHUB_STEP_SUMMARY"
        fi
