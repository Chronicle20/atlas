name: Main - Build and Publish

on:
  push:
    branches: [main]
    # Loop prevention: when update-image-tags' squash-merges its bot PR
    # onto main, the resulting commit only touches the manifest file. We
    # skip main-publish on those squash-merges so they don't re-trigger
    # the build matrix (which would produce an empty matrix anyway, but
    # paths-ignore avoids the wasted workflow run). Human edits to the
    # same file (e.g., adding a new service entry by hand) also skip —
    # acceptable, since no source/image change.
    paths-ignore:
      - 'deploy/k8s/overlays/main/kustomization.yaml'
  workflow_dispatch:
    inputs:
      force-all:
        description: 'Force build of all services'
        required: false
        default: 'false'
        type: boolean
      service:
        description: 'Specific service to build (leave empty for change detection)'
        required: false
        default: ''
        type: string

concurrency:
  group: main-publish
  cancel-in-progress: false

env:
  GO_VERSION: '1.25.5'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Detect which services have changed
  # ============================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docker-services-matrix: ${{ steps.override.outputs.docker-services-matrix || steps.detect.outputs.docker-services-matrix }}
      has-changes: ${{ steps.has-changes.outputs.value }}
      short-sha: ${{ steps.short-sha.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute short SHA
        id: short-sha
        shell: bash
        run: |
          echo "value=$(git rev-parse --short=7 ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          force-all: ${{ github.event.inputs.force-all }}

      - name: Apply single-service override
        id: override
        if: ${{ github.event.inputs.service != '' }}
        shell: bash
        run: |
          SPECIFIC="${{ github.event.inputs.service }}"
          echo "Overriding matrix to only build: $SPECIFIC"
          ROW=$(jq -c --arg name "$SPECIFIC" \
            '[.services[] | select(.name == $name) | select(.docker_image != null) | {name, path, docker_context: (.docker_context // .path), docker_image}]' \
            .github/config/services.json)
          echo "docker-services-matrix=$ROW" >> $GITHUB_OUTPUT

      - name: Compute has-changes flag and summary
        id: has-changes
        shell: bash
        env:
          OVERRIDE_MATRIX: ${{ steps.override.outputs.docker-services-matrix }}
          DETECT_MATRIX: ${{ steps.detect.outputs.docker-services-matrix }}
          REASON: ${{ steps.detect.outputs.selection-reason }}
        run: |
          if [ -n "$OVERRIDE_MATRIX" ]; then
            DOCKER="$OVERRIDE_MATRIX"
            EFFECTIVE_REASON="single-service override"
          else
            DOCKER="$DETECT_MATRIX"
            EFFECTIVE_REASON="$REASON"
          fi
          COUNT=$(echo "$DOCKER" | jq length)
          if [ "$COUNT" -gt 0 ]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

          {
            echo "### Publish Detection Summary";
            echo "- **Reason**: $EFFECTIVE_REASON";
            echo "- **Services to publish**: $COUNT";
            echo "";
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$COUNT" -gt 0 ]; then
            {
              echo "**Services:**";
              echo "$DOCKER" | jq -r '.[].name' | sed 's/^/- /';
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ============================================
  # Build and Push AMD64 Images
  # ============================================
  build-amd64:
    name: Build AMD64 - ${{ matrix.service.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.docker-services-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.docker_context }}
          file: ${{ matrix.service.path }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.service.docker_image }}:latest-amd64
            ${{ matrix.service.docker_image }}:main-${{ needs.detect-changes.outputs.short-sha }}-amd64
          cache-from: type=gha,scope=${{ matrix.service.name }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-amd64
          # Disable attestations to produce single-platform image (not manifest list)
          # Required for docker manifest create to work correctly
          provenance: false
          sbom: false

  # ============================================
  # Build and Push ARM64 Images
  # ============================================
  build-arm64:
    name: Build ARM64 - ${{ matrix.service.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.docker-services-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.docker_context }}
          file: ${{ matrix.service.path }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ matrix.service.docker_image }}:latest-arm64
            ${{ matrix.service.docker_image }}:main-${{ needs.detect-changes.outputs.short-sha }}-arm64
          cache-from: type=gha,scope=${{ matrix.service.name }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-arm64
          # Disable attestations to produce single-platform image (not manifest list)
          # Required for docker manifest create to work correctly
          provenance: false
          sbom: false

  # ============================================
  # Create and Push Multi-Arch Manifests
  # ============================================
  create-manifest:
    name: Create Manifest - ${{ matrix.service.name }}
    needs: [detect-changes, build-amd64, build-arm64]
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.docker-services-matrix) }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          IMAGE="${{ matrix.service.docker_image }}"
          SHORT_SHA="${{ needs.detect-changes.outputs.short-sha }}"

          # :latest — multi-arch manifest list (back-compat for anything pinning latest)
          echo "Creating manifest for $IMAGE:latest"
          docker manifest create $IMAGE:latest \
            --amend $IMAGE:latest-amd64 \
            --amend $IMAGE:latest-arm64
          docker manifest push $IMAGE:latest

          # :main-<sha7> — SHA-pinned manifest list used by the GitOps promotion PR
          echo "Creating manifest for $IMAGE:main-$SHORT_SHA"
          docker manifest create $IMAGE:main-$SHORT_SHA \
            --amend $IMAGE:main-$SHORT_SHA-amd64 \
            --amend $IMAGE:main-$SHORT_SHA-arm64
          docker manifest push $IMAGE:main-$SHORT_SHA

          echo "### Manifests Created" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: $IMAGE" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: latest, main-$SHORT_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- **Architectures**: amd64, arm64" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # GitOps promotion: open auto-merge PR bumping
  # main overlay's images: block to the new SHA tag.
  # Without this, Argo CD wouldn't notice any drift
  # for code-only changes — the :latest tag string
  # stays the same and the manifest is byte-identical.
  # ============================================
  update-image-tags:
    name: Update main overlay image tags
    needs: [detect-changes, create-manifest]
    if: needs.detect-changes.outputs.has-changes == 'true' && needs.create-manifest.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # MANIFEST_PAT lets the bot PR trigger downstream workflows
          # (PR Validation) so the auto-merge has a green check to wait
          # on. Falls back to GITHUB_TOKEN, but PRs opened by GITHUB_TOKEN
          # don't trigger workflows, so auto-merge would hang.
          token: ${{ secrets.MANIFEST_PAT || secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" \
            -o /usr/local/bin/yq && chmod +x /usr/local/bin/yq

      - name: Stamp CATALOG_REVISION
        run: |
          set -e
          for dir in deploy/seed/*/*/; do
            printf '%s' "$GITHUB_SHA" > "${dir}CATALOG_REVISION"
          done

      - name: Bump newTag for every built service
        env:
          SERVICES_JSON: ${{ needs.detect-changes.outputs.docker-services-matrix }}
          SHORT_SHA: ${{ needs.detect-changes.outputs.short-sha }}
        run: |
          set -euo pipefail
          OVERLAY=deploy/k8s/overlays/main/kustomization.yaml
          NEW_TAG="main-${SHORT_SHA}"

          # The docker-services-matrix is a JSON array of {name, path, docker_image, ...}.
          # For each entry, find its image in the overlay's `images:` block and bump newTag.
          while read -r image; do
              echo "Bumping ${image} → ${NEW_TAG}"
              yq -i \
                  "(.images[] | select(.name == \"${image}\") | .newTag) = \"${NEW_TAG}\"" \
                  "$OVERLAY"
          done < <(echo "$SERVICES_JSON" | jq -r '.[].docker_image')

          # Show the resulting diff in the workflow log for auditability
          git --no-pager diff "$OVERLAY" || true

      - name: Open auto-merge PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.MANIFEST_PAT || secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ needs.detect-changes.outputs.short-sha }}
          SERVICES_JSON: ${{ needs.detect-changes.outputs.docker-services-matrix }}
        run: |
          set -euo pipefail
          OVERLAY=deploy/k8s/overlays/main/kustomization.yaml

          if git diff --quiet "$OVERLAY"; then
              echo "No image-tag changes to commit. Skipping PR."
              exit 0
          fi

          BRANCH="bot/main-image-bump-${SHORT_SHA}"
          BUILT_SVCS=$(echo "$SERVICES_JSON" | jq -r '[.[].name] | join(", ")')

          git config user.name 'atlas-image-bot'
          git config user.email 'atlas-image-bot@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add "$OVERLAY" deploy/seed
          # Loop prevention is handled at the workflow trigger level via
          # paths-ignore on main-publish.yml's `on.push` — the squash-merge
          # commit will only touch deploy/k8s/overlays/main/kustomization.yaml,
          # which is path-filtered out. Don't add [skip ci] to the commit
          # message: that would ALSO skip pr-validation.yml on the bot PR
          # branch, leaving auto-merge with no required check to wait on.
          git commit -m "chore(images): bump main overlay to ${{ needs.detect-changes.outputs.short-sha }}

          Bumps image tags for: ${BUILT_SVCS}

          Generated by main-publish.yml after a successful build + manifest push.
          See deploy/k8s/README.md for the ATLAS_ENV / GitOps promotion flow.

          Refs main-publish run ${{ github.run_id }}."
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(images): bump main overlay to ${SHORT_SHA}" \
              --body "Auto-generated by main-publish.yml run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          Bumps \`deploy/k8s/overlays/main/kustomization.yaml\`'s \`images:\` block from \`newTag: latest\` (or the prior \`main-<sha>\`) to \`newTag: main-${SHORT_SHA}\` for every service rebuilt in this run.

          **Services updated:** ${BUILT_SVCS}

          Argo CD's \`Application(atlas-main)\` detects the manifest diff on its next reconcile and triggers a rolling restart of the affected Deployments with the new image digest.

          Will auto-merge once required checks pass.")
          echo "PR opened: $PR_URL"
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.MANIFEST_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" --auto --squash --delete-branch || {
              echo "::warning::Auto-merge could not be enabled (branch protection may require manual approval). PR is open at #${{ steps.pr.outputs.number }}."
          }

  # ============================================
  # Summary Job
  # ============================================
  publish-complete:
    name: Publish Complete
    needs: [detect-changes, build-amd64, build-arm64, create-manifest]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          echo "### Publish Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          AMD64_RESULT="${{ needs.build-amd64.result }}"
          ARM64_RESULT="${{ needs.build-arm64.result }}"
          MANIFEST_RESULT="${{ needs.create-manifest.result }}"
          HAS_CHANGES="${{ needs.detect-changes.outputs.has-changes }}"

          if [ "$HAS_CHANGES" != "true" ]; then
            echo "No services to publish - no changes detected." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| AMD64 Builds | $AMD64_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Builds | $ARM64_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Manifest Creation | $MANIFEST_RESULT |" >> $GITHUB_STEP_SUMMARY

          # Fail if any job failed
          if [ "$AMD64_RESULT" == "failure" ] || [ "$ARM64_RESULT" == "failure" ] || [ "$MANIFEST_RESULT" == "failure" ]; then
            echo ""
            echo "One or more publish jobs failed!"
            exit 1
          fi

          echo ""
          echo "All images published successfully!"
