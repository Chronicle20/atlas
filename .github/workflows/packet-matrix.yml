name: packet-matrix

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/packet-audit/**'
      - 'libs/atlas-packet/**'
      - 'docs/packets/**'
      - 'services/atlas-configurations/seed-data/templates/**'

env:
  GO_VERSION: '1.25.5'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Packet-audit tests
        run: cd tools/packet-audit && go test ./...

      - name: fname-doc check
        # Every packet-definition struct that has an audit report must carry an
        # accurate `// packet-audit:fname <IDAName>` comment. Fails on drift
        # (comment != resolved fname) or a missing comment for a resolvable
        # struct. Regenerate with `go run ./tools/packet-audit fname-doc`.
        run: go run ./tools/packet-audit fname-doc --check

      - name: operations table check
        # Each dispatcher-family writer's per-tenant `operations` mode table must
        # match the IDA-verified per-version enumeration in
        # docs/packets/dispatchers/*.yaml. A drifted mode byte resolves to the
        # wrong client switch arm (or 99 → crash). Regenerate with
        # `go run ./tools/packet-audit operations`.
        run: go run ./tools/packet-audit operations --check

      - name: dispatcher lint
        # Enforces the mode-prefix dispatcher-family invariants INV-1..INV-5
        # documented in docs/packets/DISPATCHER_FAMILY.md: discrete-per-mode
        # structs (no shared-by-shape), config-driven mode resolution (no
        # hard-coded mode bytes / discarded resolved code), footgun-free body
        # functions (no caller-specified op/code/mode/key selector), no dangling
        # #-candidate or phantom audit report, and no orphaned codec. Families
        # not yet migrated are listed in docs/packets/dispatcher-lint-baseline.yaml
        # and skipped (one note line each); THAT BASELINE ONLY SHRINKS — a fresh
        # violation outside it fails CI. Also enforces the family-cap guard
        # (task-169 FR-5.1): every docs/packets/dispatchers/*.yaml family must be
        # discrete-implemented or families.yaml/baseline-listed, so a new
        # unimplemented+unlisted family can't escape mode-prefix capping.
        # Read-only.
        run: go run ./tools/packet-audit dispatcher-lint

      - name: doc-freshness check
        # The packet-process-facts block in docs/packets/PROCESS.md is the single
        # source of truth every playbook links to (version set, dispatcher
        # baselines, CI gates). This check asserts each fact still matches the
        # tool's ground truth (matrix.VersionKeys, dispatcher-lint-baseline.yaml,
        # evidence/families.yaml, and this workflow's gate steps) so doc drift
        # (task-169 RC-B) can't silently reopen. Fails on any divergence; fix by
        # updating PROCESS.md (or the diverged source) so they agree. Read-only.
        run: go run ./tools/packet-audit doc-freshness --check

      - name: gate-check
        # The behavioral guard for the version-gate off-by-one class (task-169
        # FR-3.1b). docs/packets/gates.yaml enumerates version-gated wire
        # divergences (packet + boundary + the two adjacent straddling version
        # keys); this asserts a VERIFIED byte-fixture pins the encoding on BOTH
        # sides of every gate — a gate is only trustworthy if both straddling
        # versions are proven, so a regression on the unpinned side can't slip
        # through. Fails if any `full` gate is missing a verified side; add a
        # gates.yaml row via its authoring contract, or mark a genuine coverage
        # gap `expect: partial` with a reason (never fabricate a fixture).
        # Read-only.
        run: go run ./tools/packet-audit gate-check --check

      - name: Coverage matrix check
        # The conflict backlog was burned down to ZERO in task-085 (registry
        # re-derivation + template wiring across all five versions), so
        # `matrix --check` now exits 0 on a clean tree. The gate is fully
        # blocking: ANY non-zero exit fails CI — a 🟥 conflict (exit 1, a
        # genuine registry/template/Atlas discrepancy), a stale committed
        # STATUS.md/status.json (exit 1, regenerate and commit), a fatal-class
        # finding (orphan/dangling/stale/drift/unresolvable/malformed/no-export),
        # or a runtime error (exit 3). The capture-then-report shape below only
        # exists to print a helpful, categorized message before failing.
        run: |
          set +e
          go run ./tools/packet-audit matrix --check 2>/tmp/matrix_check.txt
          rc=$?
          echo $rc > /tmp/matrix_check_code
          exit 0
        id: matrix_check

      - name: Matrix check gate
        run: |
          rc=$(cat /tmp/matrix_check_code)
          if [ "$rc" -eq 0 ]; then
            echo "matrix --check passed (exit 0): no conflicts, no fatal findings, outputs fresh."
            exit 0
          fi
          # Highlight the most actionable class first.
          fatal=$(grep -ciE 'orphan|dangling|stale|drift|unresolv|malformed|no export for version' /tmp/matrix_check.txt || true)
          if [ "$fatal" -gt 0 ]; then
            echo "::error::matrix --check reported $fatal fatal-class finding(s) (orphan/dangling/stale/drift/unresolvable/malformed/no-export):"
            grep -iE 'orphan|dangling|stale|drift|unresolv|malformed|no export for version' /tmp/matrix_check.txt || true
          fi
          if [ "$rc" -eq 3 ]; then
            echo "::error::matrix --check exited 3 (runtime failure — corrupt registry/template, unreadable export, etc.):"
          else
            echo "::error::matrix --check exited $rc — a 🟥 conflict or stale committed STATUS.md/status.json. Regenerate with 'go run ./tools/packet-audit matrix' and commit, or resolve the conflict:"
          fi
          cat /tmp/matrix_check.txt
          exit 1
