name: packet-matrix

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/packet-audit/**'
      - 'libs/atlas-packet/**'
      - 'docs/packets/**'
      - 'services/atlas-configurations/seed-data/templates/**'

env:
  GO_VERSION: '1.25.5'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Packet-audit tests
        run: cd tools/packet-audit && go test ./...

      - name: Coverage matrix check
        # ~1090 conflict rows remain after Phase-5 discovery (915 cross-version
        # template-coverage gaps + 163 absent-but-routed + 12 genuine Atlas
        # findings); exit 1 is grandfathered until the conflict burn-down follow-up
        # task clears them.  Exit 0 (clean) and exit 1 (conflicts only) both let
        # step 2 pass; exit 3 (runtime failure) is a hard stop.
        # Follow-up: task-085 follow-up: conflict burn-down
        #   — per-version template coverage + D3 cross-version rule refinement.
        #   Remove the exit-1 exception in step 2 when `matrix --check` exits 0
        #   on main.
        run: |
          set +e
          go run ./tools/packet-audit matrix --check 2>/tmp/matrix_check.txt
          rc=$?
          echo $rc > /tmp/matrix_check_code
          exit 0
        id: matrix_check

      - name: Fatal-class guard
        # Fail on runtime errors (exit 3: corrupt registry, unreadable template,
        # etc.) — these are not grandfathered conflicts.
        # Fail unconditionally on any line that mentions orphan markers, dangling
        # linkage, stale evidence, hash drift, unresolvable references, malformed
        # records, or missing IDA exports — these must never be grandfathered.
        run: |
          recorded_code=$(cat /tmp/matrix_check_code)
          if [ "$recorded_code" -ne 0 ] && [ "$recorded_code" -ne 1 ]; then
            echo "::error::matrix --check exited $recorded_code (runtime failure); output follows:"
            cat /tmp/matrix_check.txt
            exit 1
          fi
          count=$(grep -ciE 'orphan|dangling|stale|drift|unresolv|malformed|no export for version' /tmp/matrix_check.txt || true)
          if [ "$count" -gt 0 ]; then
            echo "::error::matrix --check reported $count fatal-class finding(s); see step output"
            grep -iE 'orphan|dangling|stale|drift|unresolv|malformed|no export for version' /tmp/matrix_check.txt || true
            exit 1
          fi
          echo "Fatal-class check passed (exit=$recorded_code, 0 fatal hits)."
