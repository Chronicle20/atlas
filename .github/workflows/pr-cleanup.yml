name: PR Cleanup

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to clean up'
        required: true
        type: string

concurrency:
  group: pr-cleanup-${{ github.event.pull_request.number || github.event.inputs.pr-number }}
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr-number }}

jobs:
  delete-images:
    name: Delete per-PR ghcr image tags
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout (for services.json)
        uses: actions/checkout@v4

      - name: Compute service list
        id: svc
        run: |
          jq -c '[.services[] | select(.docker_image) | select(.type != "support-image") | .name]' \
            < .github/config/services.json > /tmp/svcs.json
          echo "list=$(cat /tmp/svcs.json)" >> $GITHUB_OUTPUT

      - name: Delete tags
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          for svc in $(jq -r '.[]' /tmp/svcs.json); do
            echo "Cleaning up $svc tags matching pr-${PR_NUMBER}-*"
            # List versions separately from the delete loop so a 404 on the
            # listing call (package never published — e.g. the first PR that
            # adds a new service to services.json) cleanly skips the service
            # instead of aborting under `set -euo pipefail`.
            VIDS=$(gh api "/users/chronicle20/packages/container/${svc}%2F${svc}/versions" \
                     --paginate \
                     --jq '.[] | select(.metadata.container.tags[]? | startswith("pr-'"${PR_NUMBER}"'-")) | .id' \
                     2>/dev/null) \
              || { echo "  skip: package $svc not present on ghcr"; continue; }
            for vid in $VIDS; do
              gh api --method DELETE \
                "/users/chronicle20/packages/container/${svc}%2F${svc}/versions/${vid}" \
                || echo "  skip: $svc/$vid"
            done
          done

  # Branch deletion intentionally NOT done here.
  #
  # `bot/pr-<N>-resolved` is the Argo CD ApplicationSet's
  # targetRevision. Argo CD's PostDelete hook
  # (`deploy/k8s/overlays/pr/postdelete-cleanup.yaml`, the
  # `atlas-pr-cleanup` Job) fires only when the Application is deleted
  # — which is up to 24h after this workflow runs, because of the
  # `atlas.cleanup-grace: 24h` annotation honored by the hourly cleanup
  # CronJob in cluster-infra. The hook handler re-renders the manifest
  # from `bot/pr-<N>-resolved`. If we delete the branch here on PR
  # close, that render fails with
  # `unable to resolve 'bot/pr-<N>-resolved' to a commit SHA`,
  # `post-delete-finalizer.argocd.argoproj.io/cleanup` can't complete,
  # and the Application sits in Terminating until someone patches
  # `metadata.finalizers: []`. Reproduced 2026-05-16 on PR #461 close.
  #
  # Branch lifetime is now coupled to Application lifetime: the
  # cluster-infra cleanup CronJob deletes the branch via GitHub API
  # immediately after it successfully deletes the Application. See
  # `docs/runbooks/ephemeral-pr-deployments.md` §9.4.

  notify-argo:
    name: Notify Argo of PR close
    runs-on: ubuntu-latest
    needs: [delete-images]
    steps:
      - name: Log notice
        run: |
          echo "PR ${PR_NUMBER} closed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Argo CD's hourly cleanup CronJob will set cleanup-deadline within the hour."
          echo "Force-cleanup (bypassing grace) is documented in docs/runbooks/ephemeral-pr-deployments.md §9.2."
          echo "bot/pr-${PR_NUMBER}-resolved will be deleted by cluster-infra's cleanup CronJob after the Application finalizes (runbook §9.4)."
