name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      force-all:
        description: 'Force validation of all services'
        required: false
        default: 'false'
        type: boolean

concurrency:
  # Two concurrency lanes per PR — one for push/synchronize events (the
  # noisy lane: cancels in-progress when the user pushes a new commit),
  # and a separate lane for `labeled` events (the rare lane: must not be
  # cancelled by an in-flight build).
  #
  # When a user pushes a commit and adds `deploy-env` in quick succession,
  # GitHub fires both `synchronize` and `labeled` events. With a single
  # shared lane and `cancel-in-progress: true`, whichever fired second
  # cancelled the first — and the surviving run's `pull_request.labels`
  # payload reflected the state at fire time, missing the label if push
  # came first. Result: `update-pr-overlay` gated on
  # `contains(github.event.pull_request.labels.*.name, 'deploy-env')`
  # was skipped, the bot branch never updated, Argo CD continued syncing
  # against stale image tags. See issue #597.
  #
  # Splitting the lane preserves cancel-in-progress for normal push
  # churn while letting `labeled` events run to completion. The
  # trade-off: a push+label race produces two concurrent CI runs (the
  # push lane builds without push=true; the labeled lane builds with
  # push=true and updates the bot branch). The wasted compute is fine
  # — the alternative is silent stale-overlay teardowns.
  group: pr-${{ github.head_ref || github.ref }}${{ github.event.action == 'labeled' && '-labeled' || '' }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.0'
  NODE_VERSION: '22'

jobs:
  # ============================================
  # Detect which services/libraries have changed
  # ============================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      libraries: ${{ steps.detect.outputs.libraries }}
      has-service-changes: ${{ steps.detect.outputs.has-service-changes }}
      has-library-changes: ${{ steps.detect.outputs.has-library-changes }}
      has-ui-changes: ${{ steps.detect.outputs.has-ui-changes }}
      has-go-workspace-changes: ${{ steps.detect.outputs.has-go-workspace-changes }}
      has-workflow-changes: ${{ steps.detect.outputs.has-workflow-changes }}
      all-go-services: ${{ steps.detect.outputs.all-go-services }}
      all-go-libraries: ${{ steps.detect.outputs.all-go-libraries }}
      go-services-matrix: ${{ steps.detect.outputs.go-services-matrix }}
      go-libraries-matrix: ${{ steps.detect.outputs.go-libraries-matrix }}
      docker-services-matrix: ${{ steps.detect.outputs.docker-services-matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          force-all: ${{ github.event.inputs.force-all }}

  # ============================================
  # Redis Key Guard
  # Builds the rediskeyguard analyzer and runs it
  # over every Go service module. Fails if any
  # service calls raw go-redis keyed commands
  # outside libs/atlas-redis (FR-1.5, task-045).
  # ============================================
  redis-key-guard:
    name: Redis Key Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: redis key guard
        run: ./tools/redis-key-guard.sh

  # ============================================
  # Test Go Libraries
  # ============================================
  test-go-libraries:
    name: Test Library - ${{ matrix.library.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.go-libraries-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        library: ${{ fromJson(needs.detect-changes.outputs.go-libraries-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/go-test
        with:
          working-directory: ${{ matrix.library.module_path }}
          go-version: ${{ env.GO_VERSION }}
          race-detection: 'true'
          coverage: 'true'
          coverage-threshold: ${{ matrix.library.coverage_threshold }}

  # ============================================
  # Test Go Services
  # ============================================
  test-go-services:
    name: Test Service - ${{ matrix.service.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.go-services-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.go-services-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/go-test
        with:
          working-directory: ${{ matrix.service.module_path }}
          go-version: ${{ env.GO_VERSION }}

  # ============================================
  # Test UI Service
  # ============================================
  test-ui:
    name: Test UI
    needs: detect-changes
    if: needs.detect-changes.outputs.has-ui-changes == 'true' || needs.detect-changes.outputs.has-workflow-changes == 'true' || github.event.inputs.force-all == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests and build
        uses: ./.github/actions/node-test
        with:
          working-directory: services/atlas-ui
          node-version: ${{ env.NODE_VERSION }}

  # ============================================
  # Build Docker Images (bake — sharded matrix)
  #
  # Always runs Dockerfile validation; pushes to ghcr only when the PR
  # carries the `deploy-env` label. The full set of services to build
  # is sourced from detect-changes.outputs.docker-services-matrix and
  # split into 4 round-robin shards so each shard runs on its own
  # ubuntu-latest runner (restoring most of the parallelism that the
  # original per-service matrix had, while keeping the one-Dockerfile +
  # bake architecture). The per-PR tag (pr-<N>-<sha> when push=true,
  # pr-<N>/pr-dispatch otherwise) is computed once per shard and applied
  # to that shard's targets.
  # ============================================
  build-docker:
    name: Build Docker (bake — shard ${{ matrix.shard }}/3)
    needs: [detect-changes, test-go-services, test-go-libraries, test-ui]
    if: |
      always() &&
      needs.detect-changes.outputs.docker-services-matrix != '[]' &&
      (needs.test-go-services.result == 'success' || needs.test-go-services.result == 'skipped') &&
      (needs.test-go-libraries.result == 'success' || needs.test-go-libraries.result == 'skipped') &&
      (needs.test-ui.result == 'success' || needs.test-ui.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "short=$(git rev-parse --short=7 "$SHA")" >> $GITHUB_OUTPUT

      - name: Compute push flag and tag
        id: pushtag
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          HAS_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy-env') }}
        run: |
          set -euo pipefail
          if [ "$HAS_LABEL" = "true" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "tag=pr-${PR_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            if [ "$IS_PR" = "true" ]; then
              echo "tag=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            else
              echo "tag=pr-dispatch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Derive bake inputs for this shard
        id: bake-inputs
        env:
          MATRIX_JSON: ${{ needs.detect-changes.outputs.docker-services-matrix }}
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          # Round-robin assignment: shard S gets indices where (index % 4) == S.
          # Round-robin (vs contiguous slicing) spreads alphabetically-clustered
          # build-time outliers evenly across shards.
          TARGETS=$(echo "$MATRIX_JSON" | jq -c --argjson s "$SHARD" \
            '[to_entries[] | select(.key % 4 == $s) | .value.name]')
          # image-name-map is the full map; the action looks up only the shard's targets.
          IMAGE_MAP=$(echo "$MATRIX_JSON" | jq -c 'map({(.name): .docker_image}) | add')
          echo "targets=$TARGETS"          >> "$GITHUB_OUTPUT"
          echo "image-name-map=$IMAGE_MAP" >> "$GITHUB_OUTPUT"
          echo "Shard ${SHARD} got $(echo "$TARGETS" | jq 'length') target(s)"

      - name: Build Docker images (bake)
        if: steps.bake-inputs.outputs.targets != '[]'
        uses: ./.github/actions/docker-build
        with:
          targets: ${{ steps.bake-inputs.outputs.targets }}
          image-name-map: ${{ steps.bake-inputs.outputs.image-name-map }}
          tags: ${{ steps.pushtag.outputs.tag }}
          push: ${{ steps.pushtag.outputs.push }}
          platform: linux/amd64
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GHCR_TOKEN }}
          cache-scope: atlas-bake-amd64-shard${{ matrix.shard }}

  # ============================================
  # PR-env resolved overlay (bot branch)
  #
  # After build-docker completes, create/update a derived branch
  # `bot/pr-<N>-resolved` that:
  #   1. Substitutes every PLACEHOLDER_ATLAS_ENV / PLACEHOLDER_PR_NUMBER /
  #      PLACEHOLDER_FULL_SHA token in deploy/k8s/overlays/pr/ AND
  #      deploy/k8s/overlays/pr-cleanup/ with the actual per-PR value
  #      (sed across both directories).
  #   2. Bumps deploy/k8s/overlays/pr/kustomization.yaml's `images:` block
  #      so only the just-built services point at pr-<N>-<sha>; unchanged
  #      services keep `newTag: latest` (which option-b's main-publish
  #      flow now keeps fresh under :latest manifest list).
  #   3. Force-pushes to bot/pr-<N>-resolved.
  #
  # The Argo ApplicationSet uses multi-source mode and targets
  # bot/pr-<N>-resolved (not the PR head directly), with two `sources:`
  # entries — one for each overlay. Kustomize sees already-resolved
  # overlays with no placeholders. This sidesteps kustomize's
  # substring-substitution limitations on the bracketed
  # KAFKA_CONSUMER_GROUP form and the variable-dash DB_NAME form.
  #
  # The pr-cleanup/ overlay is intentionally separate because the
  # PostDelete cleanup Job lives in `argocd` namespace, not atlas-pr-<N>
  # (see pr-cleanup/kustomization.yaml header + task-070/design.md §3.1).
  #
  # GITHUB_TOKEN is used intentionally: its pushes do NOT trigger
  # downstream workflow runs, which is exactly what we want — the bot
  # commit must not re-trigger pr-validation.yml on the bot branch
  # (infinite loop), and we don't need PR checks to run on bot branches.
  # ============================================
  update-pr-overlay:
    name: Resolve PR overlay
    needs: [detect-changes, build-docker]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'deploy-env') &&
      needs.build-docker.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN is intentional — see header comment.
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install yq
        run: |
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" \
            -o /usr/local/bin/yq && chmod +x /usr/local/bin/yq

      - name: Compute per-PR tokens
        id: tokens
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # ATLAS_ENV must match the ApplicationSet's computation:
          #   sha256("pr-<N>")[:4]
          ATLAS_ENV=$(printf "pr-%d" "$PR_NUMBER" | sha256sum | cut -c1-4)
          SHORT_SHA=$(git rev-parse --short=7 "$HEAD_SHA")
          echo "atlas_env=$ATLAS_ENV" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Tokens: ATLAS_ENV=$ATLAS_ENV PR_NUMBER=$PR_NUMBER SHA=$SHORT_SHA"

      - name: Substitute placeholders in PR overlay
        env:
          ATLAS_ENV: ${{ steps.tokens.outputs.atlas_env }}
          PR_NUMBER: ${{ steps.tokens.outputs.pr_number }}
          FULL_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # find + sed across every file under deploy/k8s/overlays/pr/ AND
          # deploy/k8s/overlays/pr-cleanup/. The cleanup Job has its own
          # overlay because it must land in `argocd` namespace, not
          # atlas-pr-<N> (see pr-cleanup/kustomization.yaml header +
          # task-070/design.md §3.1 Design A). Both overlays share the
          # same PLACEHOLDER tokens and are resolved against the same
          # bot/pr-<N>-resolved branch via Argo CD multi-source.
          #
          # PLACEHOLDER_FULL_SHA uses the full 40-char commit SHA, not the
          # short one used for image tags below: `git fetch <remote> <ref>`
          # against GitHub does not resolve abbreviated SHAs (the
          # seed-catalog git-sync sidecar fails with "couldn't find remote
          # ref" if a short SHA is used).
          find deploy/k8s/overlays/pr deploy/k8s/overlays/pr-cleanup \
              -type f \( -name '*.yaml' -o -name '*.yml' \) \
            -exec sed -i \
              -e "s|PLACEHOLDER_ATLAS_ENV|${ATLAS_ENV}|g" \
              -e "s|PLACEHOLDER_PR_NUMBER|${PR_NUMBER}|g" \
              -e "s|PLACEHOLDER_FULL_SHA|${FULL_SHA}|g" \
              {} +
          echo "=== Placeholders remaining (expect none) ==="
          grep -rn 'PLACEHOLDER_' deploy/k8s/overlays/pr deploy/k8s/overlays/pr-cleanup \
            || echo "(clean)"

      - name: Stamp CATALOG_REVISION (PR)
        run: |
          set -e
          SHA="${{ github.event.pull_request.head.sha }}"
          for dir in deploy/seed/*/*/; do
            printf '%s' "$SHA" > "${dir}CATALOG_REVISION"
          done

      - name: Bump image tags for built services
        env:
          SERVICES_JSON: ${{ needs.detect-changes.outputs.docker-services-matrix }}
          PR_NUMBER: ${{ steps.tokens.outputs.pr_number }}
          SHORT_SHA: ${{ steps.tokens.outputs.short_sha }}
        run: |
          set -euo pipefail
          NEW_TAG="pr-${PR_NUMBER}-${SHORT_SHA}"

          # The detect-changes matrix is the exact list of services
          # that build-docker pushed pr-<N>-<sha> tags for. For each,
          # bump the corresponding entry in each overlay's `images:`
          # block. Services NOT in this list keep their existing tag
          # (typically `latest` for first-build PRs, or a previous
          # `pr-<N>-<sha>` for subsequent pushes that left unchanged
          # services untouched).
          #
          # Two overlays are kept in sync: `pr/` (the main env manifest)
          # and `pr-cleanup/` (the PostDelete cleanup Job). Without the
          # second loop, a PR that rebuilds atlas-pr-bootstrap would
          # still see its cleanup Job pull `:latest` at teardown,
          # masking any bootstrap-script change from the PR's own
          # validation cycle. Only atlas-pr-bootstrap appears in
          # `pr-cleanup/`'s images block today; the yq selector silently
          # skips any service not present, so the same loop is safe to
          # apply to both overlays.
          for OVERLAY in deploy/k8s/overlays/pr/kustomization.yaml \
                         deploy/k8s/overlays/pr-cleanup/kustomization.yaml; do
              while read -r image; do
                  echo "Bumping ${image} → ${NEW_TAG} in ${OVERLAY}"
                  yq -i \
                      "(.images[]? | select(.name == \"${image}\") | .newTag) = \"${NEW_TAG}\"" \
                      "$OVERLAY"
              done < <(echo "$SERVICES_JSON" | jq -r '.[].docker_image')
          done

          echo "=== Resulting images: block (head) ==="
          yq '.images[0:5]' "$OVERLAY"

      - name: Regenerate cluster-infra coordination ConfigMap artifact
        run: |
          set -euo pipefail
          deploy/k8s/overlays/pr/scripts/gen-cleanup-env.sh
          # The output file is checked in. If a service was added or
          # removed since the last regen, this run's output diverges
          # from the committed copy and CI fails — forcing the PR
          # author to commit the regen alongside their services.json
          # change.
          if ! git diff --exit-code dev/cluster-infra-coordination/atlas-pr-cleanup-env.example.yaml; then
              echo '::error::dev/cluster-infra-coordination/atlas-pr-cleanup-env.example.yaml is stale. Run deploy/k8s/overlays/pr/scripts/gen-cleanup-env.sh and commit the result.' >&2
              exit 1
          fi

      - name: Force-push bot/pr-<N>-resolved
        env:
          PR_NUMBER: ${{ steps.tokens.outputs.pr_number }}
          SHORT_SHA: ${{ steps.tokens.outputs.short_sha }}
        run: |
          set -euo pipefail
          BRANCH="bot/pr-${PR_NUMBER}-resolved"
          git config user.name 'atlas-image-bot'
          git config user.email 'atlas-image-bot@users.noreply.github.com'

          # Stage the substituted overlays (pr + pr-cleanup) + bumped image tags + stamped CATALOG_REVISION.
          git add deploy/k8s/overlays/pr deploy/k8s/overlays/pr-cleanup deploy/seed

          if git diff --cached --quiet; then
              echo "::warning::No changes to commit — PR overlay was already resolved? Skipping force-push."
              exit 0
          fi

          # Create/reset the bot branch from the current PR head with our
          # substitutions on top. Force-push to overwrite any prior bot
          # branch for this PR (each new PR push starts fresh).
          git checkout -b "$BRANCH"
          git commit -m "chore(pr-overlay): resolve placeholders for PR #${PR_NUMBER} at ${SHORT_SHA}

          Auto-generated by pr-validation.yml. Argo ApplicationSet(atlas-pr)
          targets this branch; do not edit by hand. Force-pushed on every
          pr-validation run for PR #${PR_NUMBER}.

          [skip ci]"
          git push --force-with-lease origin "$BRANCH"
          echo "Pushed bot/pr-${PR_NUMBER}-resolved at $(git rev-parse --short=7 HEAD)"

  # ============================================
  # Summary Job
  # ============================================
  pr-validation-complete:
    name: PR Validation Complete
    needs: [detect-changes, test-go-libraries, test-go-services, test-ui, build-docker, update-pr-overlay, redis-key-guard]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          echo "### PR Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check each job result
          LIBS_RESULT="${{ needs.test-go-libraries.result }}"
          SERVICES_RESULT="${{ needs.test-go-services.result }}"
          UI_RESULT="${{ needs.test-ui.result }}"
          DOCKER_RESULT="${{ needs.build-docker.result }}"
          OVERLAY_RESULT="${{ needs.update-pr-overlay.result }}"
          GUARD_RESULT="${{ needs.redis-key-guard.result }}"

          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Go Libraries | $LIBS_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Go Services | $SERVICES_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| UI | $UI_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Builds | $DOCKER_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Resolve PR overlay | $OVERLAY_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Redis Key Guard | $GUARD_RESULT |" >> $GITHUB_STEP_SUMMARY

          # Fail if any required job failed. update-pr-overlay is allowed
          # to be skipped (e.g., when the deploy-env label is absent) but
          # not to fail outright.
          if [ "$LIBS_RESULT" == "failure" ] || [ "$SERVICES_RESULT" == "failure" ] || [ "$UI_RESULT" == "failure" ] || [ "$DOCKER_RESULT" == "failure" ] || [ "$OVERLAY_RESULT" == "failure" ] || [ "$GUARD_RESULT" == "failure" ]; then
            echo ""
            echo "One or more jobs failed!"
            exit 1
          fi

          echo ""
          echo "All checks passed!"
