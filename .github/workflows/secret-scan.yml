name: Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan new commits
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Scan only commits introduced by this event. Pre-existing
          # findings in older history are tracked separately and would
          # otherwise block every PR.
          if [ -n "${PR_BASE:-}" ] && [ -n "${PR_HEAD:-}" ]; then
            log_opts="${PR_BASE}..${PR_HEAD}"
          elif [ -n "${PUSH_BEFORE:-}" ] \
            && [ "${PUSH_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            log_opts="${PUSH_BEFORE}..${PUSH_AFTER}"
          else
            log_opts="HEAD~1..HEAD"
          fi
          echo "Scanning commit range: $log_opts"
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1 \
            --log-opts="$log_opts" \
            --report-format sarif \
            --report-path gitleaks-report.sarif

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: ignore
