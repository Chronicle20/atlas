x-atlas-infra: &atlas-infra
  env_file: .env
  networks: [atlas]
  restart: unless-stopped

# Services using &atlas-defaults wait for atlas-configurations and atlas-tenants
# to pass their healthchecks before starting. This removes the crashloop storm
# that used to happen on cold start while those two services were still seeding.
x-atlas-defaults: &atlas-defaults
  <<: *atlas-infra
  depends_on:
    atlas-configurations:
      condition: service_healthy
    atlas-tenants:
      condition: service_healthy

services:
  atlas-account:
    <<: *atlas-defaults
    container_name: atlas-account
    build:
      context: ../..
      dockerfile: services/atlas-account/Dockerfile
    image: atlas-account:${ATLAS_IMAGE_TAG:-local}
    environment:
      LOG_LEVEL: debug
      DB_NAME: atlas-accounts

  atlas-asset-expiration:
    <<: *atlas-defaults
    container_name: atlas-asset-expiration
    build:
      context: ../..
      dockerfile: services/atlas-asset-expiration/Dockerfile
    image: atlas-asset-expiration:${ATLAS_IMAGE_TAG:-local}
    environment:
      LOG_LEVEL: debug
      EXPIRATION_CHECK_INTERVAL_SECONDS: "60"

  atlas-assets:
    <<: *atlas-defaults
    container_name: atlas-assets
    # Service-local build context: Dockerfile COPYs nginx.conf relative to its directory.
    build:
      context: ../../services/atlas-assets
      dockerfile: Dockerfile
    image: atlas-assets:${ATLAS_IMAGE_TAG:-local}
    volumes:
      - ../../tmp/assets:/usr/assets

  atlas-ban:
    <<: *atlas-defaults
    container_name: atlas-ban
    build:
      context: ../..
      dockerfile: services/atlas-ban/Dockerfile
    image: atlas-ban:${ATLAS_IMAGE_TAG:-local}
    environment:
      DB_NAME: atlas-ban

  atlas-buddies:
    <<: *atlas-defaults
    container_name: atlas-buddies
