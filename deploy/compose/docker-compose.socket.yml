x-atlas-infra: &atlas-infra
  env_file: .env
  networks: [atlas]
  restart: unless-stopped

x-atlas-defaults: &atlas-defaults
  <<: *atlas-infra
  depends_on:
    atlas-configurations:
      condition: service_healthy
    atlas-tenants:
      condition: service_healthy

services:
  atlas-login:
    <<: *atlas-defaults
    container_name: atlas-login
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: atlas-login
    image: atlas-login:${ATLAS_IMAGE_TAG:-local}
    environment:
      LOG_LEVEL: debug
      SERVICE_ID: e7fb1d7e-47b8-46bd-97dc-867d93530856
      SERVICE_TYPE: login-service
      EVENT_TOPIC_CONFIGURATION_SERVICE_STATUS: EVENT_TOPIC_CONFIGURATION_SERVICE_STATUS
      EVENT_TOPIC_CONFIGURATION_TENANT_STATUS: EVENT_TOPIC_CONFIGURATION_TENANT_STATUS
      DRAIN_DEADLINE_MS: "2000"
    ports:
      - "1200:1200"
      - "8300:8300"
      - "8700:8700"
      - "9200:9200"
      - "9500:9500"
      - "18500:18500"

  atlas-channel:
    <<: *atlas-defaults
    container_name: atlas-channel
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: atlas-channel
    image: atlas-channel:${ATLAS_IMAGE_TAG:-local}
    environment:
      LOG_LEVEL: debug
      SERVICE_ID: e7fb1d7e-47b8-46bd-97dc-867d93530000
      SERVICE_TYPE: channel-service
      EVENT_TOPIC_CONFIGURATION_SERVICE_STATUS: EVENT_TOPIC_CONFIGURATION_SERVICE_STATUS
      EVENT_TOPIC_CONFIGURATION_TENANT_STATUS: EVENT_TOPIC_CONFIGURATION_TENANT_STATUS
      DRAIN_DEADLINE_MS: "5000"
    ports:
      - "1201:1201"
      - "8301:8301"
      - "8701:8701"
      - "18501:18501"
