---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlas-assets-pvc
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-assets
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-assets
  template:
    metadata:
      labels:
        app: atlas-assets
    spec:
      containers:
      - name: nginx
        image: ghcr.io/chronicle20/atlas-assets/atlas-assets:latest
        env:
        # Consumed by the nginx image's envsubst entrypoint when it
        # renders /etc/nginx/templates/default.conf.template into
        # /etc/nginx/conf.d/default.conf. Substituted into the
        # atlas-wz-extractor proxy_pass FQDN so character-render
        # fallbacks reach the wz-extractor in the same namespace as
        # this pod (atlas-main, atlas-pr-461, etc.). Pre-ArgoCD this
        # was a hardcoded `.atlas.svc.cluster.local` literal.
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Restrict envsubst to POD_NAMESPACE so it does not clobber
        # nginx vars like $uri, $args, $http_*, $ctenant.
        # Requires nginx image >= 1.25.4 (we ship 1.31-alpine).
        - name: NGINX_ENVSUBST_FILTER
          value: POD_NAMESPACE
        ports:
        - containerPort: 8080
        volumeMounts:
          - mountPath: "/usr/assets"
            name: assets-storage
            readOnly: true
      volumes:
        - name: assets-storage
          persistentVolumeClaim:
            claimName: atlas-assets-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-assets
spec:
  selector:
    app: atlas-assets
  ports:
  - protocol: TCP
    port: 8080
