---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlas-data-job-manager
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-data-job-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlas-data-job-manager
subjects:
  - kind: ServiceAccount
    name: atlas-data
---
# Cluster-scoped permission to read the pod's own namespace. atlas-data's
# graceful-shutdown handler (tenantpurge.PurgeAllIfNamespaceTerminating)
# checks the namespace's deletionTimestamp to distinguish env teardown
# from routine pod restarts. Issue #596.
#
# This ClusterRole is shared across environments. A per-environment
# ClusterRoleBinding (in deploy/k8s/overlays/{pr,main}/) grants this
# ClusterRole to that env's atlas-data ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atlas-data-ns-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-data
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlas-data
  template:
    metadata:
      labels:
        app: atlas-data
    spec:
      serviceAccountName: atlas-data
      # tenantpurge.PurgeAllIfNamespaceTerminating runs on SIGTERM and
      # may issue many MinIO deletes (~2 GiB per tenant on a fully
      # ingested PR env). The default 30s is too tight; 360s gives the
      # handler headroom while still bounding pod-termination latency
      # on routine restarts (where the handler short-circuits in <1s
      # because the namespace's deletionTimestamp is nil). Issue #596.
      terminationGracePeriodSeconds: 360
      containers:
      - name: data
        image: ghcr.io/chronicle20/atlas-data/atlas-data:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: atlas-env
        env:
        - name: LOG_LEVEL
          value: "debug"
        - name: DB_NAME
          value: "atlas-data"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD
        - name: MODE
          value: "rest"
        - name: MINIO_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: atlas-minio-credentials
              key: endpoint
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: atlas-minio-credentials
              key: accessKey
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: atlas-minio-credentials
              key: secretKey
        - name: INGEST_IMAGE
          value: "ghcr.io/chronicle20/atlas-data/atlas-data:latest"
        - name: INGEST_JOB_TEMPLATE_CONFIGMAP
          value: "atlas-data-ingest-job-template"
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-data
spec:
  selector:
    app: atlas-data
  ports:
  - protocol: TCP
    port: 8080
