---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-ingress-configmap
data:
  nginx.conf: |
    worker_processes  1;

    events {
      worker_connections  1024;
    }


    http {
      include mime.types;
      default_type  application/octet-stream;

      sendfile        on;

      keepalive_timeout  300;
      proxy_read_timeout 30;
      proxy_connect_timeout 10;
      proxy_send_timeout 30;
      send_timeout 30;

      underscores_in_headers on;

      server {
        listen       80;
        server_name  dev.atlas.home;

        client_max_body_size 500M;

        resolver 10.43.0.10 valid=30s;

        proxy_pass_request_headers on;
        proxy_set_header TENANT_ID $http_tenant_id;
        proxy_set_header REGION $http_region;
        proxy_set_header MAJOR_VERSION $http_major_version;
        proxy_set_header MINOR_VERSION $http_minor_version;

        include /etc/nginx/conf.d/routes.conf;
      }
    }
  routes.conf.template: |
    location ~ ^/api/merchants(/.*)?$ {
      set $u "atlas-merchant.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/messengers(/.*)?$ {
      set $u "atlas-messengers.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/parties(/.*)?$ {
      set $u "atlas-parties.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/party-quests(/.*)?$ {
      set $u "atlas-party-quests.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/portals/blocked(/.*)?$ {
      set $u "atlas-portals.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/portals(/.*)?$ {
      set $u "atlas-portal-actions.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/guilds(/.*)?$ {
      set $u "atlas-guilds.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/pets(/.*)?$ {
      set $u "atlas-pets.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/accounts/[^/]+/cash-shop(/.*)?$ {
      set $u "atlas-cashshop.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/accounts/[^/]+/wallet(/.*)?$ {
      set $u "atlas-cashshop.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/buddy-list(/.*)?$ {
      set $u "atlas-buddies.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/visits(/.*)?$ {
      set $u "atlas-maps.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/location(/.*)?$ {
      proxy_pass http://atlas-maps.${POD_NAMESPACE}.svc.cluster.local:8080;
    }

    location ~ ^/api/characters/[^/]+/buffs(/.*)?$ {
      set $u "atlas-buffs.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/invites(/.*)?$ {
      set $u "atlas-invites.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/keys(/.*)?$ {
      set $u "atlas-keys.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/monster-book(/.*)?$ {
      set $u "atlas-monster-book.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/pets(/.*)?$ {
      set $u "atlas-pets.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/quests(/.*)?$ {
      set $u "atlas-quest.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/quests/conversations(/.*)?$ {
      set $u "atlas-npc-conversations.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/quests/[^/]+/conversation(/.*)?$ {
      set $u "atlas-npc-conversations.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/skills(/.*)?$ {
      set $u "atlas-skills.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/macros(/.*)?$ {
      set $u "atlas-skills.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/cash-shop(/.*)?$ {
      set $u "atlas-cashshop.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/inventory(/.*)?$ {
      set $u "atlas-inventory.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/notes(/.*)?$ {
      set $u "atlas-notes.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/cash-shop(/.*)?$ {
      set $u "atlas-cashshop.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/maps/[^/]+/instances/[^/]+/drops(/.*)?$ {
      set $u "atlas-drops.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/maps/[^/]+/instances/[^/]+/chalkboards(/.*)?$ {
      set $u "atlas-chalkboards.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/chalkboards(/.*)?$ {
      set $u "atlas-chalkboards.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/maps/[^/]+/instances/[^/]+/chairs(/.*)?$ {
      set $u "atlas-chairs.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/chairs(/.*)?$ {
      set $u "atlas-chairs.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/drops/seed(/.*)?$ {
      set $u "atlas-drop-information.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/continents/drops$ {
      set $u "atlas-drop-information.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/drops(/.*)?$ {
      set $u "atlas-drops.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/configurations(/.*)?$ {
      set $u "atlas-configurations.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    # 1. Character render (most specific; must match before generic assets).
    location "~ ^/api/assets/(?<tenant>[^/]+)/(?<region>[^/]+)/(?<v>[0-9]+\.[0-9]+)/character/(?<hash>[a-f0-9]{32,64})\.png$" {
      set $major ""; set $minor "";
      if ($v ~ ^(?<maj>[0-9]+)\.(?<min>[0-9]+)$) { set $major $maj; set $minor $min; }
      set $u "atlas-renders.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_set_header TENANT_ID     $tenant;
      proxy_set_header REGION        $region;
      proxy_set_header MAJOR_VERSION $major;
      proxy_set_header MINOR_VERSION $minor;
      proxy_pass http://$u/api/wz/character/render/$tenant/$region/$v/$hash.png$is_args$args;
      add_header Cache-Control "public, max-age=86400, immutable" always;
    }

    # 2. Map render (composite-on-miss; MinIO serves cache hits).
    location ~ ^/api/assets/(?<t>[^/]+)/(?<r>[^/]+)/(?<v>[0-9]+\.[0-9]+)/map/(?<mapid>[0-9]+)/render\.png$ {
      set $u "minio.minio.svc.cluster.local:9000";
      rewrite ^ /atlas-renders/tenants/$t/regions/$r/versions/$v/map/$mapid/render.png break;
      proxy_intercept_errors on;
      error_page 404 = @maprender_miss;
      proxy_pass http://$u;
      add_header Cache-Control "public, max-age=86400, immutable" always;
    }
    location @maprender_miss {
      set $u "atlas-renders.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u/api/wz/map/render/$t/$r/$v/$mapid/render.png;
      add_header Cache-Control "public, max-age=86400, immutable" always;
    }

    # 3. Generic assets — per-tenant → shared fallback against MinIO.
    location ~ ^/api/assets/(?<t>[^/]+)/(?<r>[^/]+)/(?<v>[0-9]+\.[0-9]+)/(?<rest>.+)$ {
      set $u "minio.minio.svc.cluster.local:9000";
      rewrite ^ /atlas-assets/tenants/$t/regions/$r/versions/$v/$rest break;
      proxy_intercept_errors on;
      error_page 404 = @shared_fallback;
      proxy_pass http://$u;
      add_header Cache-Control "public, max-age=86400" always;
    }
    location @shared_fallback {
      set $u "minio.minio.svc.cluster.local:9000";
      rewrite ^ /atlas-assets/shared/regions/$r/versions/$v/$rest break;
      proxy_pass http://$u;
      add_header Cache-Control "public, max-age=86400" always;
    }

    location ~ ^/api/accounts(/.*)?$ {
      set $u "atlas-account.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/bans(/.*)?$ {
      set $u "atlas-ban.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/seed(/.*)?$ {
      set $u "atlas-character-factory.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/factory(/.*)?$ {
      set $u "atlas-character-factory.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters(/.*)?$ {
      set $u "atlas-character.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    # 4. WZ upload route (large body, no buffering). The `^~` modifier is
    # load-bearing: without it, the regex catch-all `location ~ ^/api/data(/.*)?$`
    # below wins (nginx evaluates regexes before plain prefixes), the request
    # routes through it without the `client_max_body_size 4G` override, and
    # nginx 413s the atlas.zip upload at its default 1 MB limit. `^~` makes
    # the prefix match short-circuit regex evaluation when it's the longest
    # prefix.
    location ^~ /api/data/wz {
      set $u "atlas-data.${POD_NAMESPACE}.svc.cluster.local:8080";
      client_max_body_size 4G;
      proxy_request_buffering off;
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
      send_timeout 3600;
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/data(/.*)?$ {
      set $u "atlas-data.${POD_NAMESPACE}.svc.cluster.local:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/gachapons(/.*)?$ {
