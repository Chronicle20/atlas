---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-ingress-configmap
data:
  nginx.conf: |
    worker_processes  1;

    events {
      worker_connections  1024;
    }


    http {
      include mime.types;
      default_type  application/octet-stream;

      sendfile        on;

      keepalive_timeout  300;
      proxy_read_timeout 30;
      proxy_connect_timeout 10;
      proxy_send_timeout 30;
      send_timeout 30;

      underscores_in_headers on;

      server {
        listen       80;
        server_name  dev.atlas.home;

        client_max_body_size 500M;

        resolver 10.43.0.10 valid=30s;

        proxy_pass_request_headers on;
        proxy_set_header TENANT_ID $http_tenant_id;
        proxy_set_header REGION $http_region;
        proxy_set_header MAJOR_VERSION $http_major_version;
        proxy_set_header MINOR_VERSION $http_minor_version;

        # Local-debug overrides (tools/debug-start.sh). Mounted from the
        # optional ConfigMap `atlas-ingress-debug-overrides`, which is NOT
        # tracked by Argo CD (created/edited ad-hoc by the debug script).
        # Included BEFORE routes.conf so override location blocks win the
        # nginx first-regex-match rule. Glob include is lenient when the
        # directory is empty or the CM is absent.
        include /etc/nginx/conf.d/debug-overrides/*.conf;

        include /etc/nginx/conf.d/routes.conf;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-ingress
  template:
    metadata:
      labels:
        app: atlas-ingress
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: atlas-ingress
              topologyKey: kubernetes.io/hostname
      containers:
      - name: nginx
        image: nginx:latest
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Restrict envsubst to POD_NAMESPACE so it does not clobber nginx vars
        # like $request_uri, $u, $http_*. Requires nginx image >= 1.25.4.
        - name: NGINX_ENVSUBST_FILTER
          value: POD_NAMESPACE
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: nginx-conf-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-routes-volume
          mountPath: /etc/nginx/templates/routes.conf.template
          subPath: routes.conf.template
        - name: nginx-debug-overrides-volume
          mountPath: /etc/nginx/conf.d/debug-overrides
          readOnly: true
      volumes:
      - name: nginx-conf-volume
        configMap:
          name: atlas-ingress-configmap
      - name: nginx-routes-volume
        configMap:
          name: atlas-ingress-routes
      # Optional ConfigMap holding per-service debug redirects (see
      # tools/debug-start.sh). `optional: true` lets the pod start even
      # when no debug session exists in the namespace.
      - name: nginx-debug-overrides-volume
        configMap:
          name: atlas-ingress-debug-overrides
          optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-ingress
spec:
  selector:
    app: atlas-ingress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: dev.atlas.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlas-ingress
            port:
              number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: atlas-ingress-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: atlas-ingress
