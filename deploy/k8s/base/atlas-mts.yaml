---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-mts
  labels:
    atlas.seed-catalog: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-mts
  template:
    metadata:
      labels:
        app: atlas-mts
    spec:
      volumes: []
      containers:
      - name: mts
        image: ghcr.io/chronicle20/atlas-mts/atlas-mts:latest
        volumeMounts: []
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: atlas-env
        env:
        - name: LOG_LEVEL
          value: "debug"
        - name: DB_NAME
          value: "atlas-mts"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-mts
spec:
  selector:
    app: atlas-mts
  ports:
  - protocol: TCP
    port: 8080
