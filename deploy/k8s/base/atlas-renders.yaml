---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-renders
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-renders
  template:
    metadata:
      labels:
        app: atlas-renders
    spec:
      containers:
        - name: renders
          image: ghcr.io/chronicle20/atlas-renders/atlas-renders:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: atlas-env
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: REST_PORT
              value: "8080"
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: atlas-minio-credentials
                  key: endpoint
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-minio-credentials
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-minio-credentials
                  key: secretKey
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-renders
spec:
  selector:
    app: atlas-renders
  ports:
    - protocol: TCP
      port: 8080
#
# KEDA autoscaling (design §4.6) is intentionally NOT included here. The
# bee cluster does not have the `keda.sh/ScaledObject` CRD installed, and
# Argo CD does NOT skip unknown CRDs gracefully — the sync errors out for
# the whole Application with "could not find keda.sh/ScaledObject".
#
# Follow-up: install KEDA cluster-wide (cluster-infra concern), then add
# back this manifest. Until then the Deployment runs at its base replica
# count (2) without RPS-driven autoscaling. atlas-renders is stateless
# and tolerates manual scaling via `kubectl scale deploy/atlas-renders`.
