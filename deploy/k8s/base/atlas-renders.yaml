---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-renders
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-renders
  template:
    metadata:
      labels:
        app: atlas-renders
    spec:
      containers:
        - name: renders
          image: ghcr.io/chronicle20/atlas-renders/atlas-renders:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: atlas-env
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: REST_PORT
              value: "8080"
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: atlas-minio-credentials
                  key: endpoint
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-minio-credentials
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-minio-credentials
                  key: secretKey
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-renders
spec:
  selector:
    app: atlas-renders
  ports:
    - protocol: TCP
      port: 8080
---
# KEDA ScaledObject for RPS-based autoscaling (design §4.6).
# Requires keda.sh CRDs installed in the cluster. Argo will skip the resource
# gracefully if the CRD is absent (kustomize will still produce valid YAML).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: atlas-renders
spec:
  scaleTargetRef:
    name: atlas-renders
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-server.monitoring.svc.cluster.local:80
        metricName: atlas_renders_requests_total
        threshold: "50"
        query: sum(rate(atlas_renders_requests_total[1m]))
