---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-summons
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-summons
  template:
    metadata:
      labels:
        app: atlas-summons
    spec:
      containers:
      - name: summons
        image: ghcr.io/chronicle20/atlas-summons/atlas-summons:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: atlas-env
        env:
        - name: LOG_LEVEL
          value: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-summons
spec:
  selector:
    app: atlas-summons
  ports:
  - protocol: TCP
    port: 8080
