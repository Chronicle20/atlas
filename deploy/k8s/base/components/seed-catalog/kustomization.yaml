apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - configmap.yaml

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      labelSelector: "atlas.seed-catalog=true"
    path: patch-volume.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      labelSelector: "atlas.seed-catalog=true"
    path: patch-sidecar.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      labelSelector: "atlas.seed-catalog=true"
    path: patch-mount.yaml
