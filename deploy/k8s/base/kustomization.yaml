components:
  - components/seed-catalog

# Push every Deployment to sync-wave 10 so Argo CD waits for the
# atlas-kafka-precreate Job (sync-wave 0) to complete before rolling
# them out. This eliminates the cold-start stampede that happens when
# many consumers race to auto-create the same topics on first publish.
patches:
  - target:
      kind: Deployment
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
        annotations:
          argocd.argoproj.io/sync-wave: "10"
