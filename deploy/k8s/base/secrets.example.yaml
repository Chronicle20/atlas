# db-credentials carries Postgres user + password for atlas services AND for
# per-PR hook Jobs (create-dbs, cleanup) running in atlas-pr-* namespaces,
# AND for the PostDelete cleanup Job running in argocd (task-070 / Design A:
# Job moved out of atlas-pr-<N> so the namespace prune doesn't kill it
# mid-cleanup).
#
# Reflector annotations replicate this Secret from atlas-main into every
# atlas-pr-* namespace AND into argocd. Without them, the relevant Jobs fail
# with CreateContainerConfigError because Secrets are namespace-scoped. See
# the runbook §9.1b for Reflector setup.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    # `atlas-pr-.*` covers every per-PR namespace; `argocd` covers the new
    # PostDelete cleanup Job introduced by task-070 Design A. Both forms
    # of the regex are honored as a Go regexp.MatchString — see
    # https://github.com/emberstack/kubernetes-reflector#reflection.
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "atlas-pr-.*|argocd"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "atlas-pr-.*|argocd"
type: Opaque
data:
  DB_USER: CHANGE_ME_BASE64
  DB_PASSWORD: CHANGE_ME_BASE64
