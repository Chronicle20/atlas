# db-credentials carries Postgres user + password for atlas services AND for
# per-PR hook Jobs (create-dbs, cleanup) running in atlas-pr-* namespaces.
#
# Reflector annotations replicate this Secret from atlas-main into every
# atlas-pr-* namespace as it's created. Without them, per-PR hook Jobs fail
# with CreateContainerConfigError because Secrets are namespace-scoped. See
# the runbook §9.1b for Reflector setup.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "atlas-pr-.*"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "atlas-pr-.*"
type: Opaque
data:
  DB_USER: CHANGE_ME_BASE64
  DB_PASSWORD: CHANGE_ME_BASE64
