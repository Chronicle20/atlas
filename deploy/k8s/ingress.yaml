      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/notes(/.*)?$ {
      set $u "atlas-notes:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/cash-shop(/.*)?$ {
      set $u "atlas-cashshop:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/maps/[^/]+/instances/[^/]+/drops(/.*)?$ {
