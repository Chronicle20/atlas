    }

    location / {
      set $u "atlas-ui:80";
      proxy_pass http://$u$request_uri;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-ingress
  namespace: atlas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-ingress
  template:
    metadata:
      labels:
        app: atlas-ingress
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: atlas-ingress
              topologyKey: kubernetes.io/hostname
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: nginx-conf-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-conf-volume
          mountPath: /etc/nginx/routes.conf
          subPath: routes.conf
      volumes:
      - name: nginx-conf-volume
        configMap:
          name: atlas-ingress-configmap
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-ingress
  namespace: atlas
spec:
  selector:
    app: atlas-ingress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-ingress
  namespace: atlas
spec:
  ingressClassName: traefik
  rules:
  - host: dev.atlas.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlas-ingress
            port:
              number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: atlas-ingress-pdb
  namespace: atlas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: atlas-ingress
