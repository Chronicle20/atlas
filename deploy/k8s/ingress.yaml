      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/continents/drops$ {
      set $u "atlas-drop-information:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/drops(/.*)?$ {
      set $u "atlas-drops:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/configurations(/.*)?$ {
      set $u "atlas-configurations:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/assets(/.*)?$ {
      set $u "atlas-assets:8080";
      # When proxy_pass contains a URI, nginx does not automatically forward the
      # original query string â€” character renders rely on ?skin=&hair=&items=...
      # so we must re-append it explicitly.
      proxy_pass http://$u$1$is_args$args;
    }

    location ~ ^/api/accounts(/.*)?$ {
      set $u "atlas-account:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/bans(/.*)?$ {
