      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/data(/.*)?$ {
      set $u "atlas-data:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/wz(/.*)?$ {
      set $u "atlas-wz-extractor:8080";
      client_max_body_size 4G;
      proxy_request_buffering off;
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
      send_timeout 3600;
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/gachapons(/.*)?$ {
      set $u "atlas-gachapons:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/global-items(/.*)?$ {
      set $u "atlas-gachapons:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/history(/.*)?$ {
      set $u "atlas-ban:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/maps/actions(/.*)?$ {
      set $u "atlas-map-actions:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/maps/[^/]+/actions(/.*)?$ {
      set $u "atlas-map-actions:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/maps/[^/]+/instances/[^/]+/characters(/.*)?$ {
      set $u "atlas-maps:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/maps/[^/]+/instances/[^/]+/weather(/.*)?$ {
      set $u "atlas-maps:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/maps/[^/]+/instances/[^/]+/monsters(/.*)?$ {
      set $u "atlas-monsters:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/monsters/[^/]+/drops(/.*)?$ {
      set $u "atlas-drop-information:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/items/[^/]+/drops(/.*)?$ {
      set $u "atlas-drop-information:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/items/[^/]+/recipes(/.*)?$ {
      set $u "atlas-npc-conversations:8080";
