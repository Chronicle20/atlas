    location ~ ^/api/tenants(/.*)?$ {
      set $u "atlas-tenants:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/transports(/.*)?$ {
      set $u "atlas-transports:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/maps/[^/]+/instances/[^/]+/reactors(/.*)?$ {
      set $u "atlas-reactors:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/reactors/actions(/.*)?$ {
      set $u "atlas-reactor-actions:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/reactors/[^/]+/actions(/.*)?$ {
      set $u "atlas-reactor-actions:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/reactors/[^/]+/drops(/.*)?$ {
