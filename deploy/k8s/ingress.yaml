    }

    location ~ ^/api/npcs/conversations(/.*)?$ {
      set $u "atlas-npc-conversations:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/npcs/[^/]+/conversations(/.*)?$ {
      set $u "atlas-npc-conversations:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/npcs/[^/]+/recipes(/.*)?$ {
      set $u "atlas-npc-conversations:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/npcs(/.*)?$ {
      set $u "atlas-npc-shops:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/commodities(/.*)?$ {
      set $u "atlas-npc-shops:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/notes(/.*)?$ {
      set $u "atlas-notes:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/shops(/.*)?$ {
      set $u "atlas-npc-shops:8080";
