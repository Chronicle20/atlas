    location ~ ^/api/reactors(/.*)?$ {
      set $u "atlas-reactors:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/sagas(/.*)?$ {
      set $u "atlas-saga-orchestrator:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/validations(/.*)?$ {
      set $u "atlas-query-aggregator:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/worlds/[^/]+/channels/[^/]+/characters/[^/]+/rates(/.*)?$ {
      set $u "atlas-rates:8080";
