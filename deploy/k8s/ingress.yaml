---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-ingress-configmap
  namespace: atlas
data:
  nginx.conf: |
    worker_processes  1;

    events {
      worker_connections  1024;
    }


    http {
      include mime.types;
      default_type  application/octet-stream;

      sendfile        on;

      keepalive_timeout  300;
      proxy_read_timeout 30;
      proxy_connect_timeout 10;
      proxy_send_timeout 30;
      send_timeout 30;

      underscores_in_headers on;

      server {
        listen       80;
        server_name  dev.atlas.home;

        client_max_body_size 500M;

        resolver 10.43.0.10 valid=30s;

        proxy_pass_request_headers on;
        proxy_set_header TENANT_ID $http_tenant_id;
        proxy_set_header REGION $http_region;
        proxy_set_header MAJOR_VERSION $http_major_version;
        proxy_set_header MINOR_VERSION $http_minor_version;

        include /etc/nginx/routes.conf;
      }
    }
  routes.conf: |
    location ~ ^/api/merchants(/.*)?$ {
      set $u "atlas-merchant:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/messengers(/.*)?$ {
      set $u "atlas-messengers:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/parties(/.*)?$ {
      set $u "atlas-parties:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/party-quests(/.*)?$ {
      set $u "atlas-party-quests:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/portals/blocked(/.*)?$ {
      set $u "atlas-portals:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/portals(/.*)?$ {
      set $u "atlas-portal-actions:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/guilds(/.*)?$ {
      set $u "atlas-guilds:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/pets(/.*)?$ {
      set $u "atlas-pets:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/accounts/[^/]+/cash-shop(/.*)?$ {
      set $u "atlas-cashshop:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/accounts/[^/]+/wallet(/.*)?$ {
      set $u "atlas-cashshop:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/buddy-list(/.*)?$ {
      set $u "atlas-buddies:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/visits(/.*)?$ {
      set $u "atlas-maps:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/buffs(/.*)?$ {
      set $u "atlas-buffs:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/invites(/.*)?$ {
      set $u "atlas-invites:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/keys(/.*)?$ {
      set $u "atlas-keys:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/monster-book(/.*)?$ {
      set $u "atlas-monster-book:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/pets(/.*)?$ {
      set $u "atlas-pets:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/characters/[^/]+/quests(/.*)?$ {
      set $u "atlas-quest:8080";
      proxy_pass http://$u$request_uri;
    }

    location ~ ^/api/quests/conversations(/.*)?$ {
