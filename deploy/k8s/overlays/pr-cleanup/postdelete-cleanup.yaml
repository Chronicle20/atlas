# PostDelete hooks run AFTER all Sync-wave resources have been pruned. So the
# atlas-env, atlas-env-tokens, and atlas-db-names ConfigMaps this Job used to
# `envFrom` are gone by the time the hook fires, and the pod would wedge in
# CreateContainerConfigError. All ConfigMap-sourced values are now inlined
# below, with the bot-substituted PLACEHOLDER_PR_NUMBER token
# (resolved by pr-validation.yml's update-pr-overlay).
#
# Secrets (db-credentials, pihole-credentials, ghcr-pat) are namespace-replicas
# created by the Reflector controller from source Secrets in atlas-main /
# argocd. They persist independently of Argo CD's pruning (Reflector manages
# them by annotation, not as managed Application resources), so they remain
# available until the namespace itself is deleted.
#
# Static infra env vars (DB_HOST, DB_PORT, BOOTSTRAP_SERVERS, REDIS_URL,
# ATLAS_DB_NAMES, ATLAS_SERVICES) come from the long-lived
# `atlas-pr-cleanup-env` ConfigMap in the argocd namespace, owned by
# cluster-infra. The shape is mirrored from
# `dev/cluster-infra-coordination/atlas-pr-cleanup-env.example.yaml`,
# regenerated by deploy/k8s/overlays/pr/scripts/gen-cleanup-env.sh
# from .github/config/services.json. See task-075/context.md §4.
apiVersion: batch/v1
kind: Job
metadata:
  # Name is per-PR (suffixed with the PR number) so a Failed cleanup
  # from one PR doesn't head-of-line block every subsequent PostDelete.
  # Until task-077 the name was a literal `atlas-pr-cleanup` for every
  # PR; combined with `hook-delete-policy: HookSucceeded` (a Failed Job
  # stays put) this caused Argo to refuse the next PR's hook with
  # `SharedResourceWarning: Job/atlas-pr-cleanup is part of applications
  # argocd/atlas-pr-<this> and atlas-pr-<that>`.
  name: atlas-pr-cleanup-PLACEHOLDER_PR_NUMBER
  # Long-lived namespace. Until task-070, this Job ran in atlas-pr-<N> —
  # the same namespace Argo CD's resources-finalizer prunes during
  # Application deletion. The PostDelete hook fires AFTER prune, so by
  # the time it tried to create the Job, the namespace was gone and the
  # hook wedged with `DeletionError: namespaces "atlas-pr-<N>" not found`.
  # The cluster-infra sibling PR adds the ServiceAccount + Role.
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: atlas-pr-cleanup
      containers:
        - name: cleanup
          image: ghcr.io/chronicle20/atlas-pr-bootstrap/atlas-pr-bootstrap:latest
          command: ["/atlas/cleanup.sh"]
          envFrom:
            - secretRef:
                name: db-credentials
            - secretRef:
                name: pihole-credentials
            - secretRef:
                # New least-privilege PAT. Fine-grained, scoped to
                # Chronicle20/atlas with Contents: Read-and-write +
                # Metadata: Read + account-level Packages: Read-and-write
                # (or a classic PAT with repo + delete:packages — see
                # docs/runbooks/ephemeral-pr-deployments.md §9.5).
                # Replaces ghcr-pat (which carried only packages scope and
                # 403'd on bot-branch DELETE). Created in cluster-infra
                # sibling PR; same key name (GHCR_TOKEN) so cleanup.sh
                # doesn't change.
                name: atlas-pr-cleanup-gh-token
            - configMapRef:
                # Owned by cluster-infra (argocd namespace). See
                # dev/cluster-infra-coordination/atlas-pr-cleanup-env.example.yaml.
                name: atlas-pr-cleanup-env
          env:
            # PR_NUMBER is the sole per-PR substitution. ATLAS_ENV is
            # derived inside cleanup.sh via lib.sh::compute_atlas_env, so
            # any drift on the Application's atlas.env annotation is
            # harmless (bug #4 defensive fix; see task-070/design.md §3.4).
            - name: PR_NUMBER
              value: "PLACEHOLDER_PR_NUMBER"
