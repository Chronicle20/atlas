# PostDelete hooks run AFTER all Sync-wave resources have been pruned. So the
# atlas-env, atlas-env-tokens, and atlas-db-names ConfigMaps this Job used to
# `envFrom` are gone by the time the hook fires, and the pod would wedge in
# CreateContainerConfigError. All ConfigMap-sourced values are now inlined
# below, with the bot-substituted PLACEHOLDER_PR_NUMBER token
# (resolved by pr-validation.yml's update-pr-overlay).
#
# Secrets (db-credentials, pihole-credentials, ghcr-pat) are namespace-replicas
# created by the Reflector controller from source Secrets in atlas-main /
# argocd. They persist independently of Argo CD's pruning (Reflector manages
# them by annotation, not as managed Application resources), so they remain
# available until the namespace itself is deleted.
#
# Note: ATLAS_DB_NAMES and ATLAS_SERVICES are duplicated from
# `kustomization.yaml`'s atlas-db-names configMapGenerator and from base
# service inventory respectively. When adding a new service that needs a
# per-PR DB, update both this Job AND `kustomization.yaml`.
apiVersion: batch/v1
kind: Job
metadata:
  name: atlas-pr-cleanup
  # Long-lived namespace. Until task-070, this Job ran in atlas-pr-<N> —
  # the same namespace Argo CD's resources-finalizer prunes during
  # Application deletion. The PostDelete hook fires AFTER prune, so by
  # the time it tried to create the Job, the namespace was gone and the
  # hook wedged with `DeletionError: namespaces "atlas-pr-<N>" not found`.
  # The cluster-infra sibling PR adds the ServiceAccount + Role.
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: atlas-pr-cleanup
      containers:
        - name: cleanup
          image: ghcr.io/chronicle20/atlas-pr-bootstrap/atlas-pr-bootstrap:latest
          command: ["/atlas/cleanup.sh"]
          envFrom:
            - secretRef:
                name: db-credentials
            - secretRef:
                name: pihole-credentials
            - secretRef:
                # New least-privilege PAT. Fine-grained, scoped to
                # Chronicle20/atlas with Contents: Read-and-write +
                # Metadata: Read + account-level Packages: Read-and-write
                # (or a classic PAT with repo + delete:packages — see
                # docs/runbooks/ephemeral-pr-deployments.md §9.5).
                # Replaces ghcr-pat (which carried only packages scope and
                # 403'd on bot-branch DELETE). Created in cluster-infra
                # sibling PR; same key name (GHCR_TOKEN) so cleanup.sh
                # doesn't change.
                name: atlas-pr-cleanup-gh-token
          env:
            # PR_NUMBER is the sole per-PR substitution. ATLAS_ENV is
            # derived inside cleanup.sh via lib.sh::compute_atlas_env, so
            # any drift on the Application's atlas.env annotation is
            # harmless (bug #4 defensive fix; see task-070/design.md §3.4).
            - name: PR_NUMBER
              value: "PLACEHOLDER_PR_NUMBER"
            # Cluster-static infra (same in main env and every PR env).
            - name: DB_HOST
              value: "postgres.home"
            - name: DB_PORT
              value: "5432"
            - name: BOOTSTRAP_SERVERS
              value: "kafka.home:9093"
            - name: REDIS_URL
              value: "redis.home:6379"
            # Keep in sync with `kustomization.yaml`'s atlas-db-names literal.
            - name: ATLAS_DB_NAMES
              value: "atlas-accounts atlas-bans atlas-buddies atlas-cashshop atlas-characters atlas-configurations atlas-data atlas-drops atlas-fame atlas-gachapons atlas-guilds atlas-inventory atlas-keys atlas-map-actions atlas-maps atlas-merchant atlas-monster-book atlas-notes atlas-npc-conversations atlas-npc-shops atlas-party-quests atlas-pets atlas-portal-actions atlas-quest atlas-reactor-actions atlas-saga-orchestrator atlas-skills atlas-storage atlas-tenants"
            - name: ATLAS_SERVICES
              value: "atlas-account,atlas-asset-expiration,atlas-ban,atlas-buddies,atlas-buffs,atlas-cashshop,atlas-chairs,atlas-chalkboards,atlas-channel,atlas-character,atlas-character-factory,atlas-configurations,atlas-consumables,atlas-data,atlas-drop-information,atlas-drops,atlas-effective-stats,atlas-expressions,atlas-fame,atlas-families,atlas-gachapons,atlas-guilds,atlas-inventory,atlas-invites,atlas-keys,atlas-login,atlas-map-actions,atlas-maps,atlas-marriages,atlas-merchant,atlas-messages,atlas-messengers,atlas-monster-book,atlas-monster-death,atlas-monsters,atlas-notes,atlas-npc-conversations,atlas-npc-shops,atlas-parties,atlas-party-quests,atlas-pets,atlas-portal-actions,atlas-portals,atlas-query-aggregator,atlas-quest,atlas-rates,atlas-reactor-actions,atlas-reactors,atlas-renders,atlas-saga-orchestrator,atlas-skills,atlas-storage,atlas-tenants,atlas-transports,atlas-world,atlas-ui"
