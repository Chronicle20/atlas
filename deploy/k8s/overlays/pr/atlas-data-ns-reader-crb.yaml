# Per-PR ClusterRoleBinding granting atlas-data's ServiceAccount the
# `atlas-data-ns-reader` ClusterRole (which carries `namespaces: get`).
# Used by tenantpurge.PurgeAllIfNamespaceTerminating to detect env
# teardown vs. routine pod restart. Issue #596.
#
# The CRB name and the subject's namespace both carry the per-PR token
# (PLACEHOLDER_PR_NUMBER, sed-substituted at bot-branch resolve time).
# Argo CD garbage-collects this CRB on Application deletion.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atlas-data-ns-reader-PLACEHOLDER_PR_NUMBER
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: atlas-data-ns-reader
subjects:
  - kind: ServiceAccount
    name: atlas-data
    namespace: atlas-pr-PLACEHOLDER_PR_NUMBER
