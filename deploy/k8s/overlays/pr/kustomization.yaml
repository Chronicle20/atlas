      - REGION=GMS
      - MAJOR_VERSION=83
      - MINOR_VERSION=1

# Token replacement: ATLAS_ENV from atlas-env-tokens flows into every
# container's ATLAS_ENV env var (creating the env entry on stateless
# Deployments like atlas-ingress / atlas-ui that aren't covered by
# patches/consumer-group-env.yaml). atlas-env-tokens.data.ATLAS_ENV
# itself is rewritten per-PR by pr-validation.yml's update-pr-overlay
# job via sed across this directory — by the time kustomize runs on
# the resolved bot/pr-<N>-resolved branch, the placeholder is already
# the actual hash.
replacements:
  - source:
      kind: ConfigMap
      name: atlas-env-tokens
      fieldPath: data.ATLAS_ENV
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.*.env.[name=ATLAS_ENV].value
        options:
          # create: true lets kustomize insert ATLAS_ENV when a Deployment
          # doesn't already have it. Stateless services like atlas-ingress,
          # atlas-ui, atlas-assets, atlas-query-aggregator, and
          # atlas-wz-extractor are not patched by consumer-group-env.yaml,
          # so their ATLAS_ENV env entry is created here.
          create: true

