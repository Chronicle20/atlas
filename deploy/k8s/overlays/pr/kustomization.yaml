# Token replacement: ATLAS_ENV from atlas-env-tokens flows into every
# container's ATLAS_ENV env var. atlas-env-tokens itself is rewritten
# per-PR by the ApplicationSet before this kustomization runs.
replacements:
  - source:
      kind: ConfigMap
      name: atlas-env-tokens
      fieldPath: data.ATLAS_ENV
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.*.env.[name=ATLAS_ENV].value
        options:
          # create: true lets kustomize insert ATLAS_ENV when a Deployment
          # doesn't already have it. Stateless services like atlas-ingress,
          # atlas-ui, atlas-assets, atlas-query-aggregator, and
          # atlas-wz-extractor are not patched by consumer-group-env.yaml,
          # so their ATLAS_ENV env entry is created here.
          create: true

