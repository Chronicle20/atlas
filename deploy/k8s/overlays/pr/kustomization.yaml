# ATLAS_ENV propagation:
#
# Services that consume Kafka topics declare a `consumerGroupId`, and
# `scripts/gen-consumer-group-patch.sh` emits patches in
# `patches/consumer-group-env.yaml` that set ATLAS_ENV (plus
# KAFKA_CONSUMER_GROUP) with proper string quoting:
#
#     - name: ATLAS_ENV
#       value: "3b0b"
#
# The PLACEHOLDER is rewritten per-PR by pr-validation.yml's
# update-pr-overlay job via sed; the surrounding quotes are preserved,
# so all-digit hashes (e.g. "1756" for PR #461) parse as strings.
#
# Stateless Deployments (atlas-ingress, atlas-ui,
# atlas-query-aggregator, atlas-configurations,
# atlas-drop-information, atlas-gachapons) don't consume ATLAS_ENV in
# their containers and therefore have no env entry for it — and don't
# need one. An earlier kustomize `replacements:` block with
# `options.create: true` was force-injecting ATLAS_ENV here. It also
# stripped the source's string quoting, producing `value: 1756`
# (unquoted), which Argo CD's typed-patch validator rejects as int
# where the API schema demands string. That block has been removed.
