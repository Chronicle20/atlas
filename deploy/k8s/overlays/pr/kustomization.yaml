# Per-PR overlay shell.
#
# 3b0b / 743 / 7c31a53faefd422ae28cee180c2872e83ed7333f are
# sentinel strings resolved at CI time by .github/workflows/pr-validation.yml's
# update-pr-overlay job, which sed-substitutes them across this directory
# and force-pushes the result to bot/pr-<N>-resolved. The Argo CD
# ApplicationSet(atlas-pr) targets that derived branch, NOT the PR head
# directly — so kustomize never sees the placeholders.
#
# This approach sidesteps kustomize's substring-substitution limitations
# (bracketed KAFKA_CONSUMER_GROUP, variable-dash DB_NAME) which couldn't
# be cleanly resolved via either kustomization.yaml's `replacements:` or
# Argo CD's `kustomize.patches`. The CI bot can use plain sed.
#
# As a side effect of the bot-branch model: the `images:` block below
# starts with `newTag: latest` for every service. Bot job bumps only
# the services it actually rebuilt to `pr-<N>-<sha>`; the rest stay on
# `:latest`, which resolves to whatever main-side option-(b) image
# promotion last digested.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# namespace is rewritten by the ApplicationSet at sync time:
# atlas-pr-743 -> atlas-pr-<actual PR number>
namespace: atlas-pr-743
resources:
  - ../../base
  - atlas-env-tokens.yaml
  - ingress-route.yaml
  - wave0-create-dbs.yaml
  - sync-bootstrap.yaml
  - predelete-purge.yaml
  - postsync-pihole-add.yaml
  # Note: the PostDelete cleanup Job intentionally does NOT live here.
  # It moved to deploy/k8s/overlays/pr-cleanup/ (its own kustomization)
  # so kustomize's overlay-level `namespace:` directive doesn't override
  # the Job's `namespace: argocd`. See pr-cleanup/kustomization.yaml
  # header and task-070/design.md §3.1 (Design A).
patches:
  - path: patches/ingress-host.yaml
  - path: patches/db-name-suffix.yaml
  - path: patches/consumer-group-env.yaml
  - path: patches/lb-allocate.yaml
  # Ephemeral PR envs do not need HA. Pin every Deployment to a single
  # replica to halve the pod footprint vs main (some base manifests ship
  # with replicas: 2 or 4). This is the cluster-relief patch from the
  # task-063 deploy testing on 2026-05-15 — gaia + helios were sitting at
  # the default kubelet --max-pods=110, control plane was flapping
  # NodeNotReady. Targets kind=Deployment so Jobs / IngressRoutes etc.
  # are untouched.
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Spread this PR env's pods evenly across schedulable nodes. Same
  # rationale as the main overlay (avoid the scheduler piling all
  # single-replica Deployments onto one node), with the env label sed-
  # substituted at CI time so each PR env spreads only its own pods, not
  # across other PR envs.
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                atlas.env: "3b0b"
  # Override GITSYNC_REF so the git-sync sidecar tracks the PR's full
  # commit SHA (not main). CI sed-substitutes 7c31a53faefd422ae28cee180c2872e83ed7333f at
  # apply time. Full SHA — not short — is required because
  # `git fetch <remote> <ref>` against GitHub does not resolve
  # abbreviated SHAs.
  - path: patches/seed-catalog-ref.yaml
    target:
      kind: ConfigMap
      name: seed-catalog-config
# Per-env atlas-env ConfigMap with topic suffixing.
configMapGenerator:
  - name: atlas-env
    behavior: replace
    literals:
