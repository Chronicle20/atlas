# Per-PR overlay shell.
#
# PLACEHOLDER_ATLAS_ENV / PLACEHOLDER_PR_NUMBER / PLACEHOLDER_SHA are
# sentinel strings resolved at CI time by .github/workflows/pr-validation.yml's
# update-pr-overlay job, which sed-substitutes them across this directory
# and force-pushes the result to bot/pr-<N>-resolved. The Argo CD
# ApplicationSet(atlas-pr) targets that derived branch, NOT the PR head
# directly — so kustomize never sees the placeholders.
#
# This approach sidesteps kustomize's substring-substitution limitations
# (bracketed KAFKA_CONSUMER_GROUP, variable-dash DB_NAME) which couldn't
# be cleanly resolved via either kustomization.yaml's `replacements:` or
# Argo CD's `kustomize.patches`. The CI bot can use plain sed.
#
# As a side effect of the bot-branch model: the `images:` block below
# starts with `newTag: latest` for every service. Bot job bumps only
# the services it actually rebuilt to `pr-<N>-<sha>`; the rest stay on
# `:latest`, which resolves to whatever main-side option-(b) image
# promotion last digested.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# namespace is rewritten by the ApplicationSet at sync time:
# atlas-pr-PLACEHOLDER_PR_NUMBER -> atlas-pr-<actual PR number>
namespace: atlas-pr-PLACEHOLDER_PR_NUMBER

resources:
  - ../../base
  - atlas-env-tokens.yaml
  - ingress-route.yaml
  - wave0-create-dbs.yaml
  - postsync-bootstrap.yaml
  - postsync-pihole-add.yaml
  - postdelete-cleanup.yaml

patches:
  - path: patches/db-name-suffix.yaml
  - path: patches/consumer-group-env.yaml
  - path: patches/pvc-storageclass.yaml
  - path: patches/lb-allocate.yaml

# Per-env atlas-env ConfigMap with topic suffixing.
configMapGenerator:
  - name: atlas-env
    behavior: replace
    literals:
      # Infrastructure literals.
      - BASE_SERVICE_URL=http://atlas-ingress.atlas-pr-PLACEHOLDER_PR_NUMBER.svc.cluster.local:80/api/
      - BOOTSTRAP_SERVERS=kafka.home:9093
      - DB_HOST=postgres.home
      - DB_PORT=5432
      - REDIS_URL=redis.home:6379
      - TRACE_ENDPOINT=tempo.home:4317
      - TRACE_SAMPLING_RATIO=1.0
      - REST_PORT=8080
      # Topic env vars (suffixed -PLACEHOLDER_ATLAS_ENV; auto-generated
      # below from deploy/k8s/base/env-configmap.yaml via
      # scripts/gen-topic-config.sh).
      - COMMAND_TOPIC_ACCOUNT=COMMAND_TOPIC_ACCOUNT-PLACEHOLDER_ATLAS_ENV
      - COMMAND_TOPIC_ACCOUNT_LOGOUT=COMMAND_TOPIC_ACCOUNT_LOGOUT-PLACEHOLDER_ATLAS_ENV
      - COMMAND_TOPIC_ACCOUNT_SESSION=COMMAND_TOPIC_ACCOUNT_SESSION-PLACEHOLDER_ATLAS_ENV
