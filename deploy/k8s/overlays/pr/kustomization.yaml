# Per-PR overlay shell.
#
# PLACEHOLDER_ATLAS_ENV / PLACEHOLDER_PR_NUMBER / PLACEHOLDER_SHA are
# sentinel strings rewritten by the Argo CD ApplicationSet (Phase 7.10)
# at sync time, before kustomize runs. The ATLAS_ENV slot is also
# fanned out within rendered manifests via the replacements: rule
# below.
#
# CAVEAT (substring substitution):
#   Kustomize 5.4.3 replacements support whole-value substitution and
#   delimiter-based partial substitution where the placeholder is the
#   trailing token after a single-character separator (e.g.
#   "atlas-accounts-PLACEHOLDER_ATLAS_ENV" with delimiter "-" and the
#   correct index). Bracketed forms like
#   "Account Service [PLACEHOLDER_ATLAS_ENV]" cannot be split cleanly
#   because rejoining with a multi-character delimiter corrupts the
#   value. Until that's resolved, the broader vision (replacing
#   PLACEHOLDER_ATLAS_ENV inside KAFKA_CONSUMER_GROUP, DB_NAME, and the
#   COMMAND_TOPIC_*/EVENT_TOPIC_* env keys) is handled at ApplicationSet
#   sync time, not here. The replacements: block below only covers the
#   container ATLAS_ENV env var (whole-value).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# namespace is rewritten by the ApplicationSet at sync time:
# atlas-pr-PLACEHOLDER_PR_NUMBER -> atlas-pr-<actual PR number>
namespace: atlas-pr-PLACEHOLDER_PR_NUMBER

resources:
  - ../../base
  - atlas-env-tokens.yaml
  # Hooks (created in Phase 7.5-7.10):
  #   - ingress-route.yaml         # Phase 7.5
  #   - presync-create-dbs.yaml    # Phase 7.6
  #   - postsync-bootstrap.yaml    # Phase 7.7
  #   - postsync-pihole-add.yaml   # Phase 7.8
  #   - postdelete-cleanup.yaml    # Phase 7.9

patches:
  - path: patches/db-name-suffix.yaml
  - path: patches/consumer-group-env.yaml
  - path: patches/pvc-storageclass.yaml

# Per-env atlas-env ConfigMap with topic suffixing.
configMapGenerator:
  - name: atlas-env
    behavior: replace
    literals:
      # Infrastructure literals.
      - BASE_SERVICE_URL=http://atlas-ingress.atlas-pr-PLACEHOLDER_PR_NUMBER.svc.cluster.local:80/api/
      - BOOTSTRAP_SERVERS=kafka.home:9093
      - DB_HOST=postgres.home
      - DB_PORT=5432
      - REDIS_URL=redis.home:6379
      - TRACE_ENDPOINT=tempo.home:4317
      - TRACE_SAMPLING_RATIO=1.0
      - REST_PORT=8080
      # Topic env vars (suffixed -PLACEHOLDER_ATLAS_ENV; auto-generated
      # below from deploy/k8s/base/env-configmap.yaml via
      # scripts/gen-topic-config.sh).
      - COMMAND_TOPIC_ACCOUNT=COMMAND_TOPIC_ACCOUNT-PLACEHOLDER_ATLAS_ENV
      - COMMAND_TOPIC_ACCOUNT_LOGOUT=COMMAND_TOPIC_ACCOUNT_LOGOUT-PLACEHOLDER_ATLAS_ENV
      - COMMAND_TOPIC_ACCOUNT_SESSION=COMMAND_TOPIC_ACCOUNT_SESSION-PLACEHOLDER_ATLAS_ENV
      - COMMAND_TOPIC_BUDDY_LIST=COMMAND_TOPIC_BUDDY_LIST-PLACEHOLDER_ATLAS_ENV
      - COMMAND_TOPIC_CASH_COMPARTMENT=COMMAND_TOPIC_CASH_COMPARTMENT-PLACEHOLDER_ATLAS_ENV
