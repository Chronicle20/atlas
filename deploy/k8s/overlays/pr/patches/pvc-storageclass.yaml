# Switches the per-PR PVCs to the dedicated `longhorn-pr` StorageClass
# (provisioned in the cluster-infra repo per Phase 8). That StorageClass
# sets parameters.recurringJobSelector: '[]', so PR Volumes are
# provisioned outside the default recurring backup group from the first
# reconcile -- no per-volume label patching, no race with Longhorn's
# recurring-job controller.
#
# See task-063 plan.md Phase 0 Task 0.6 for the rationale.
#
# task-071 removed all PVCs from base: atlas-data, atlas-wz-extractor, and
# atlas-assets are MinIO-backed now. This patch file is intentionally empty
# (kustomize accepts a documentless patch); it stays in place so the
# kustomization.yaml `patches:` reference doesn't error.
