# PR overrides for atlas-wz-extractor.
#
# Three of these (replicas, env, memory) contradict cluster-wide defaults;
# all are intentional for PR ergonomics:
#
# 1. replicas: 2 — restores HA on the wz-extractor specifically. The
#    cluster-wide PR pin (kustomization.yaml `kind: Deployment, replicas=1`,
#    PR #492) drops every Deployment to a single replica for pod-density
#    relief. wz-extractor is the bottleneck of PR-env bring-up (every other
#    service waits on its extract to finish before mounting atlas-data /
#    atlas-assets), so we pay the +1 pod here to halve extract wall-clock.
#    This patch must be ordered AFTER the global replicas=1 patch in
#    kustomization.yaml `patches:` to win the merge.
#
# 2. WZ_EXTRACT_PARALLELISM: "2" — the base default (4) is tuned for main's
#    4 replicas. PR runs with 2 replicas and a smaller mem limit, so we
#    halve per-pod parallelism to stay safely under the reduced budget.
#    Cluster-wide concurrency per PR env: 2 replicas × 2 workers = 4.
#
# 3. memory limit: 4Gi — bumped from 2Gi on 2026-05-17 after PR #491's
#    ephemeral OOMKilled the inner map-render pool. Until PR #516 lands
#    (which routes the inner image-package pools through
#    WZ_EXTRACT_PARALLELISM instead of runtime.NumCPU()), those pools
#    still spin up NumCPU goroutines per pod regardless of the env var
#    above — on an 8-CPU node that is 4× the budgeted concurrency, and
#    each map render holds a full-resolution RGBA buffer. 4Gi is enough
#    headroom for that worst case. Once #516 is deployed and verified,
#    revert this to 2Gi to recover the pod-density budget.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-wz-extractor
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: wz-extractor
          env:
            - name: WZ_EXTRACT_PARALLELISM
              value: "2"
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "4Gi"
