apiVersion: batch/v1
kind: Job
metadata:
  name: atlas-pr-pihole-register
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "10"
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pihole-register
          # alpine + apk add at startup: need curl AND jq to parse the v6 auth
          # session response. curlimages/curl is too minimal for jq.
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              apk add --no-cache --quiet curl jq >/dev/null
              host="${PR_NUMBER}.atlas.home"
              # The DNS-host entry in Pi-hole v6 is the literal "IP hostname" string,
              # URL-encoded (space → %20) for the path-based add/delete endpoints.
              entry="${TRAEFIK_LB_IP} ${host}"
              encoded_entry=$(printf '%s' "$entry" | sed 's/ /%20/g')
              ok=0
              for i in 1 2; do
                  base_var="PIHOLE_API_BASE_${i}"
                  token_var="PIHOLE_TOKEN_${i}"
                  base=$(eval echo \$${base_var})
                  token=$(eval echo \$${token_var})
                  [ -z "$base" ] && continue
                  # -k: PIHOLE_API_BASE_* points at internal Pi-hole admin URLs
                  # behind a self-signed (homelab) cert that the default CA bundle
                  # does not trust. Acceptable for homelab use — the call only
                  # happens cluster-internally to add a DNS A-record.
                  #
                  # Pi-hole v6 uses session-based auth: POST /api/auth with the
                  # webpassword / app-password returns a session.sid; subsequent
                  # requests pass it via the X-FTL-SID header. The pre-v6 query-
                  # string-token and X-Pi-Auth header styles are no longer
                  # accepted (v5 → v6 breaking change).
                  sid=$(curl -k -fsS -X POST "$base/api/auth" \
                      -H "Content-Type: application/json" \
                      -d "{\"password\":\"$token\"}" 2>/dev/null \
                      | jq -r '.session.sid // empty')
                  if [ -z "$sid" ]; then
                      echo "Pi-hole $i: auth failed, skipping" >&2
                      continue
                  fi
                  # PUT /api/config/dns/hosts/<encoded entry> appends to the list.
                  # Returns 201 on insert, 200 if the entry already exists.
                  if curl -k -fsS -X PUT \
                          -H "X-FTL-SID: $sid" \
                          "$base/api/config/dns/hosts/$encoded_entry"; then
                      ok=$((ok+1))
                  fi
              done
              [ "$ok" -ge 1 ] || exit 1
          envFrom:
            - configMapRef:
                name: atlas-env-tokens
            - secretRef:
                name: pihole-credentials
          env:
            - name: PR_NUMBER
              value: "PLACEHOLDER_PR_NUMBER"
            - name: TRAEFIK_LB_IP
              value: "192.168.23.230"
