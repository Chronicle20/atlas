# task-071: WZ uploads now flow through atlas-data. The prefix match ensures
# nginx picks this block before the regex /api/data catch-all so large/streaming
# uploads keep their tuned timeouts and disabled request buffering.
location /api/data/wz {
  client_max_body_size 4G;
  proxy_request_buffering off;
  proxy_read_timeout 3600;
  proxy_send_timeout 3600;
  send_timeout 3600;
  set $u "atlas-data:8080";
  proxy_pass http://$u$request_uri;
}

