# BuddyOperation — CWvsContext::OnFriendResult per-version mode table.
#
# SOURCE OF TRUTH for the BuddyOperation writer's `operations` sub-op MODE byte.
# The writer's opcode is BUDDYLIST; the leading byte (CInPacket::Decode1)
# selects one of ~12 sub-handler arms. Each arm's MODE byte is per-version DATA
# resolved at emit time from the tenant `operations` table — never a struct
# literal.
#
# Per-version OnFriendResult function addresses (IDA-verified — task-105 Task 1).
# NOTE: these are the CORRECTED ports the instances are actually running on
# (the plan/context/guild.yaml documented ports are STALE — see context.md §10):
#   gms_v83  0xa3f2e8  (MapleStory_dump.exe,      port 13341, path v83_Me)
#   gms_v84  0xa8ada2  (GMS_v84.1_U_DEVM.exe,     port 13337)
#   gms_v87  0xad7ae5  (GMSv87_4GB.exe,           port 13340)
#   gms_v95  0xa12630  (GMS_v95.0_U_DEVM.exe,     port 13339)
#   jms_v185 0xb2a873  (MapleStory_dump_SCY.exe,  port 13338)
#
# MODE-BYTE VERSION DRIFT (IDA-enumerated, NOT inferred):
#   The OnFriendResult switch is BYTE-IDENTICAL across ALL FIVE versions for
#   every key below. Unlike OnGuildResult/OnPartyResult, the buddy mode table is
#   NOT shifted in v95 — case values 0x07..0x16 match v83 exactly in the v95
#   switch (0xa12630). v83==v84==v87==v95==jms for every key.
#
# EXTRA-BYTE ARMS (the UNKNOWN_ERROR family 0x10/0x11/0x13/0x16):
#   In gms_v83/v84/v87/v95 the four cases 0x10, 0x11, 0x13, 0x16 share one arm
#   that FIRST reads `if (CInPacket::Decode1())` — a trailing extra byte — then
#   shows either a DecodeStr'd name (extra-byte != 0) or a fixed StringPool
#   notice (extra-byte == 0). So ALL FOUR of UNKNOWN_ERROR, UNKNOWN_ERROR_2,
#   UNKNOWN_ERROR_3, UNKNOWN_ERROR_4 read the extra byte — NOT only UNKNOWN_ERROR
#   (0x10) as the current Go `hasExtra` gate assumes. Model each as its own
#   discrete struct whose Encode writes the extra byte (design D1).
#   IN JMS (0xb2a873) the same four cases are MODE-ONLY: the jms arm goes
#   straight to StringPool 765 + Notice with NO leading Decode1. So on jms the
#   UNKNOWN_ERROR family writes mode only (no extra byte). Recorded per context.md
#   §10; the extra-byte structs must gate the trailing byte off (GMS) vs jms.
#
# UNKNOWN_1 (0x0A) and UNKNOWN_2 (0x12): NOT error arms. In every version both
#   share the case 7/0xA/0x12 list-reset handler (CFriend::Reset) — same shape as
#   UPDATE (0x07): they read a full buddy list, no trailing byte, no StringPool
#   notice. Their keys exist in the seed for completeness; their structs (if ever
#   built) mirror the list-update shape, not the error shape.
#
# VERSION-ADDITIVE ARM (NEEDS_CONTEXT, recorded — NOT wired here):
#   gms_v95 OnFriendResult (0xa12630) has an EXTRA `case 0x17` (StringPool 384,
#   mode-only) absent from v83/v84/v87/jms. It has NO existing Atlas
#   operation-key. Per the grounding contract a switch case with no key is a
#   stop-and-ask; it is NOT invented here. No key/line is emitted for it.
#
# Mode bytes below are DECIMAL (the tool reads ints); per-version hex is in
# context.md §10. Each value is read from THAT version's decompiled switch and
# matches the v83/v84 seed tables (template_gms_83_1.json:1572,
# template_gms_84_1.json:1593).

