# CashShopOperation — CCashShop::OnCashItemResult mode enumeration (PER-VERSION).
#
# Clientbound dispatcher: one opcode (registry CASHSHOP_OPERATION), body begins
# with Decode1(mode) → switch to a per-mode sub-handler. The mode byte VALUE is
# version-dependent: sub-operations were inserted across versions, shifting the
# enum non-uniformly (NOT a constant offset). Atlas resolves the byte at encode
# time via WithResolvedCode("operations", KEY) from the tenant template's
# writer.options.operations table — so each version's template needs THIS
# version's byte. The tables currently exist only in gms_83/gms_84; gms_87/
# gms_95/jms_185 are MISSING them (→ ResolveCode returns 99 → client crash).
# See memory bug_operations_mode_tables_missing_v87_v95_jms.
#
# `key` = the Atlas semantic operation key (the string in operations[]).
# `handler` = the v95 PDB sub-handler the mode routes to (stable identity).
# mode values are decimal; IDA-verified per version (v83=port 13342,
# v87=13341, v95=13340). gms_v84 ≈ gms_v83 (pending confirm); jms_v185 pending.

fname: CCashShop::OnCashItemResult
op: CASHSHOP_OPERATION
direction: clientbound
discriminator: Decode1   # leading mode byte

# Operations Atlas currently emits (keys present in the gms_83 operations table),
# with the IDA-verified per-version mode byte.
operations:
  - key: LOAD_INVENTORY_SUCCESS
    handler: OnCashItemResLoadLockerDone
    mode: { gms_v83: 75,  gms_v87: 80,  gms_v95: 88 }
  - key: LOAD_INVENTORY_FAILURE
    handler: OnCashItemResLoadLockerFailed
    mode: { gms_v83: 76,  gms_v87: 81,  gms_v95: 89 }
  - key: LOAD_WISHLIST
    handler: OnCashItemResLoadWishDone
    mode: { gms_v83: 79,  gms_v87: 84,  gms_v95: 92 }
  - key: UPDATE_WISHLIST
    handler: OnCashItemResSetWishDone
    mode: { gms_v83: 85,  gms_v87: 90,  gms_v95: 98 }
  - key: PURCHASE_SUCCESS
    handler: OnCashItemResBuyDone
    mode: { gms_v83: 87,  gms_v87: 92,  gms_v95: 100 }
  - key: INVENTORY_CAPACITY_INCREASE_SUCCESS
    handler: OnCashItemResIncSlotCountDone
    mode: { gms_v83: 96,  gms_v87: 101, gms_v95: 109 }
  - key: INVENTORY_CAPACITY_INCREASE_FAILED
    handler: OnCashItemResIncSlotCountFailed
    mode: { gms_v83: 97,  gms_v87: 102, gms_v95: 110 }
  - key: CASH_ITEM_MOVED_TO_INVENTORY
    handler: OnCashItemResMoveLtoSDone
    mode: { gms_v83: 104, gms_v87: 109, gms_v95: 119 }
  - key: CASH_ITEM_MOVED_TO_CASH_INVENTORY
    handler: OnCashItemResMoveStoLDone
    mode: { gms_v83: 106, gms_v87: 111, gms_v95: 121 }

# Full mode set per version (every switch case → handler), for completeness and
# to prove no Atlas-sent op is silently missing. Decimal mode values.
