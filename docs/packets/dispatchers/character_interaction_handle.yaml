# CharacterInteractionHandle - serverbound PLAYER_INTERACTION action dispatcher.
#
# SOURCE OF TRUTH for the serverbound handler's per-version mode->byte table
# (the client sends [recvOp][mode]; atlas-channel dispatches on mode). Every byte
# is IDA-verified per version; a byte absent from a version's map is either n-a
# (the feature's client dialog does not exist there) or genuinely unresolved, and
# is intentionally omitted rather than guessed. Derivation + evidence:
# docs/tasks/task-127-owl-shop-search/interaction-legacy-audit.md.
#
# Three distinct legacy enums, all IDA-verified:
#   gms_v83 (=v84/v87/v95): 45-mode reference.
#   gms_v61 (=v72): 17-mode shifted enum + OPEN/EXIT; hired-merchant MANAGEMENT
#     block is a v83+ dialog (CEntrustedShopDlg) - VERSION-ABSENT, keys omit v61/v72.
#   gms_v79: a THIRD enum - base/trade/tie match v83, but the store/merchant/field
#     block and mini-game from ASK_RETREAT up are v83-1 (FORFEIT outlier=49);
#     merchant-management n-a (no CEntrustedShopDlg). TRANSACTION omitted (no client
#     send site in the v79 or v83 IDB - server-driven this era, escalate if needed).
#   jms_v185: store/merchant block = v83-3; trade/mini-game/field-blacklist modes
#     not yet derived, omitted.

handler: CharacterInteractionHandle
fname: CMiniRoomBaseDlg::OnPacketBase
op: PLAYER_INTERACTION
direction: serverbound
opcodes: { gms_v61: "0x6F", gms_v72: "0x79", gms_v79: "0x78", gms_v83: "0x7B", gms_v84: "0x7D", gms_v87: "0x81", gms_v95: "0x90", jms_v185: "0x7C" }
