# CharacterInteractionHandle - serverbound PLAYER_INTERACTION action dispatcher.
#
# SOURCE OF TRUTH for the serverbound handler's per-version mode->byte table
# (the client sends [recvOp][mode]; atlas-channel dispatches on mode). Every byte
# is IDA-verified per version; a byte absent from a version's map is either n-a
# (the feature's client dialog / mode does not exist there) or genuinely
# unresolved, and is intentionally omitted rather than guessed. Derivation +
# evidence: docs/tasks/task-127-owl-shop-search/interaction-legacy-audit.md.
#
# Four distinct enums, all IDA-verified:
#   gms_v83 (=v84/v87/v95): 45-mode reference.
#   gms_v61 (=v72): 17-mode shifted enum + OPEN/EXIT; hired-merchant MANAGEMENT
#     block (CEntrustedShopDlg) is version-ABSENT, keys omit v61/v72.
#   gms_v79: base/trade/tie = v83; store/merchant/field + mini-game from
#     ASK_RETREAT up = v83-1 (FORFEIT outlier=49); hired-merchant MANAGEMENT
#     (CEntrustedShopDlg) IS present at v83-1 - the v79 binary's CEntrustedShopDlg
#     is symbol-stripped, not absent (twin-proof + button-id map, see
#     interaction-legacy-audit.md §7/§7.1).
#   jms_v185: NON-uniform shift - INVITE_DECLINE d0, trade block d-2,
#     store/merchant/mini-game d-3. CASH_TRADE_OPEN (folds into CREATE/VISIT/OPEN)
#     and TRANSACTION (server-driven, no client send) are n-a on jms - both omitted.

handler: CharacterInteractionHandle
fname: CMiniRoomBaseDlg::OnPacketBase
op: PLAYER_INTERACTION
direction: serverbound
opcodes: { gms_v61: "0x6F", gms_v72: "0x79", gms_v79: "0x78", gms_v83: "0x7B", gms_v84: "0x7D", gms_v87: "0x81", gms_v95: "0x90", jms_v185: "0x7C" }
