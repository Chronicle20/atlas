  # Legacy MEMORY_GAME serverbound modes (task-133 full bring-up) — every byte
  # IDA-derived from the client's COutPacket(op)+Encode1(mode) SEND sites per IDB.
  # v48=v61-1, v72=v61 (uniform). Send-site addresses (GMS_v48_1_DEVM /
  # GMS_v61.1_U_DEVM / GMS_v72.1_U_DEVM):
  #   ASK_TIE(request)   v48 sub_578494 0x2B / v61 sub_5FC5E3 0x2C / v72 sub_653317 0x2C
  #   TIE_ANSWER         v48 @0x573a54 0x2C  / v61 sub_5F7BA3 0x2D / v72 sub_64E893 0x2D
  #   FORFEIT            v48 sub_5783FB 0x2D / v61 sub_5FC54A 0x2E / v72 sub_65327D 0x2E
  #   ASK_RETREAT        v48 sub_578531 0x2F / v61 sub_5FC680 0x30 / v72 sub_6533B5 0x30
  #   RETREAT_ANSWER     v48 @0x573b11 0x30  / v61 sub_5F7C60 0x31 / v72 sub_64E953 0x31
  #   EXIT_AFTER_GAME    v48 sub_578797 0x31 / v61 sub_5FC8E6 0x32 / v72 sub_65361C 0x32
  #   CANCEL_EXIT        v48 sub_578797 0x32 / v61 sub_5FC8E6 0x33 / v72 sub_65361C 0x33
  #   READY/UNREADY      v48 sub_578663 0x33/0x34 / v61 sub_5FC7B2 0x34/0x35 / v72 sub_6534E7 0x34/0x35
  #   EXPEL              v48 sub_57871D 0x35 / v61 sub_5FC86C 0x36 / v72 sub_6535A1 0x36
  #   START              v48 sub_57860C 0x36 / v61 sub_5FC75B 0x37 / v72 sub_653492 0x37
  #   SKIP(timeout)      v48 sub_57489D 0x38 / v61 sub_5F89EC 0x39 / v72 sub_64F750 0x39
  #   MOVE_STONE         v48 sub_578388 0x39 / v61 sub_5FC4D7 0x3A / v72 sub_65320C 0x3A
  #   FIP_CARD           v48 sub_53875D 0x3D / v61 sub_5B10FA 0x3E / v72 sub_5FF6BA 0x3E
  # The shared TIE flow is the LOWER mode (ASK_TIE) and Omok-only RETREAT is
  # HIGHER (ASK_RETREAT) — the legacy interleaved layout, corrected vs the earlier
  # tie/retreat label swap (both dialogs' ASK_TIE handler send the same tie mode;
  # only Omok has the retreat handler).
