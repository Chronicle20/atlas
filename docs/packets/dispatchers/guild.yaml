# GuildOperation — CWvsContext::OnGuildResult per-version mode table.
#
# SOURCE OF TRUTH for the GuildOperation writer's `operations` sub-op MODE byte.
# The writer's opcode is GUILD_OPERATION; the leading byte (CInPacket::Decode1)
# selects one of ~35 sub-handler arms. Each arm's MODE byte is per-version DATA
# resolved at emit time from the tenant `operations` table — never a struct literal.
#
# Per-version OnGuildResult function addresses (IDA-verified — Task 1, task-103):
#   gms_v83  0xa37490  (MapleStory_dump.exe,      port 13342)
#   gms_v84  0xa82e2b  (GMS_v84.1_U_DEVM.exe,     port 13337)
#   gms_v87  0xacf7d3  (GMSv87_4GB.exe,           port 13341)
#   gms_v95  0xa0d3b0  (GMS_v95.0_U_DEVM.exe,     port 13340)
#   jms_v185 0xb22518  (MapleStory_dump_SCY.exe,  port 13339)
#
# MODE-BYTE VERSION DRIFT (IDA-enumerated, NOT inferred):
#   - gms_v83 == gms_v84 == gms_v87 == jms_v185: the switch is BYTE-IDENTICAL.
#     v83/v84/v87/jms share the (v4 > 0x32) two-switch + low-value if-chain shape;
#     every case value matches v83. v84 cases confirmed from the live v84 IDB
#     (case '4'=0x34 … case '\''=0x27 … '<'=0x3C), NOT folded from v83.
#   - gms_v95: SHIFTED. v95 uses a single flat switch(mode) with NON-UNIFORM
#     drift vs v83 (0 for cases <=0x11, +2 for the mid range, +3 for EMBLEM/NOTICE
#     and the 0x49+ quest/skill range). Mapped per arm by client read-order AND by
#     decrypting the StringPool message each arm shows (ms_aKey @0xb98830 rotl(seed)
#     ^ cipher). This is the SAME non-uniform shift family as the opcode table bug.
#
# jms_v185: SET_SKILL_RESPONSE arm is VERSION-ABSENT (no case 0x4E in the jms
#   switch; all other arms present at v83 byte values). Its jms mode is omitted.
#
# NOTE (template state, recorded for later tasks — do NOT paper over):
#   The gms_87 / gms_95 / jms_185 seed templates currently have an EMPTY
#   GuildOperation `operations` map (ops_count=0) — the documented
#   bug_operations_mode_tables_missing_v87_v95_jms. `operations --check` will
#   therefore report MISSING for every v87/v95/jms key below until a later task
#   runs `packet-audit operations` (generate) to populate those tables from THIS
#   file. The v83/v84 templates already match these values exactly.
#
# Mode bytes below are DECIMAL (the tool reads ints); the per-version hex appears
# in context.md §10. Each value is read from THAT version's decompiled switch.

writer: GuildOperation
fname: CWvsContext::OnGuildResult
op: GUILD_OPERATION
direction: clientbound
operations:
  - { key: REQUEST_NAME,                                                                       modes: { gms_v83: 1,  gms_v84: 1,  gms_v87: 1,  gms_v95: 1,  jms_v185: 1 } }
