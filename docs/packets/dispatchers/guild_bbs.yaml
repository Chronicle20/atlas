# GuildBBS — CUIGuildBBS::OnGuildBBSPacket per-version mode table.
#
# SOURCE OF TRUTH for the GuildBBS writer's `operations` sub-op MODE byte. The
# writer's opcode is GUILD_BBS_PACKET (clientbound 0x3B on all four GMS versions —
# verified against docs/packets/registry/gms_v{83,84,87,95}.yaml). The op is
# delegated CWvsContext::OnGuildBBSPacket -> CUIGuildBBS::OnGuildBBSPacket, which
# dispatches on (CInPacket::Decode1 - 6):
#   (Decode1 - 6) == 0  -> OnLoadListResult   (raw mode byte 6)  -> BBSThreadList
#   (Decode1 - 6) == 1  -> OnViewEntryResult  (raw mode byte 7)  -> BBSThread
#   (Decode1 - 6) == 2  -> OnEntryNotFound    (raw mode byte 8)  -> BBSEntryNotFound
#
# CONFIG-DRIVEN: each arm's MODE byte is resolved at emit time from the tenant
# `operations` table via WithResolvedCode (guild/bbs_body.go), exactly like the
# GuildOperation dispatcher. The 6/7/8 bytes are version-stable (no drift across
# gms_v83/v84/v87/v95), but they are config-resolved for pattern uniformity with
# the rest of the dispatcher families — there is no literal mode byte anywhere in
# the BBS clientbound path.
#
# Per-version CUIGuildBBS::OnGuildBBSPacket addresses (IDA-verified — task-103):
#   gms_v83  0x816c32  (MapleStory_dump.exe,     port 13342) — named
#   gms_v84  0x841ec9  (GMS_v84.1_U_DEVM.exe,    port 13337) — UNNAMED sub_841EC9,
#            reached via CWvsContext::OnGuildBBSPacket thunk @0xa5c77c; dispatch
#            (Decode1-6) -> sub_841F06 / sub_84224E / sub_842571 (list/view/notfound)
#   gms_v87  0x87a5df  (GMSv87_4GB.exe,          port 13341) — named
#   gms_v95  0x7c8260  (GMS_v95.0_U_DEVM.exe,    port 13340) — named
#   jms_v185 — VERSION-ABSENT in the SCY build: no OnGuildBBSPacket / CUIGuildBBS
#            symbol of any kind in the jms IDB, and the jms seed template does NOT
#            register a GuildBBS writer. Per the grounding contract no jms address
#            is fabricated; jms is omitted (no jms key below, no jms opcode).
#
# MODE-BYTE DRIFT: NONE. The (Decode1 - 6) dispatch and the 6/7/8 mode bytes are
# BYTE-IDENTICAL across gms_v83 / gms_v84 / gms_v87 / gms_v95 (IDA-verified).
#
# Mode bytes below are DECIMAL (the tool reads ints). `opcodes` supplies the
# per-version writer opCode so `packet-audit operations` (generate) can ADD the
# GuildBBS writer entry to templates that lack it (gms_87/gms_95) and populate the
# operations map on the ones that already register the writer (gms_83/gms_84).

writer: GuildBBS
fname: CUIGuildBBS::OnGuildBBSPacket
op: GUILD_BBS_PACKET
direction: clientbound
opcodes:
  gms_v83: "0x3B"
  gms_v84: "0x3B"
  gms_v87: "0x3B"
  gms_v95: "0x3B"
operations:
  - { key: BBS_THREAD_LIST,      modes: { gms_v83: 6, gms_v84: 6, gms_v87: 6, gms_v95: 6 } }
  - { key: BBS_THREAD,           modes: { gms_v83: 7, gms_v84: 7, gms_v87: 7, gms_v95: 7 } }
  - { key: BBS_ENTRY_NOT_FOUND,  modes: { gms_v83: 8, gms_v84: 8, gms_v87: 8, gms_v95: 8 } }
