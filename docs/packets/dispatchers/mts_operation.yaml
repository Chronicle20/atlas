# MtsOperation - CITC::OnNormalItemResult per-version mode table.
#
# SOURCE OF TRUTH for the MtsOperation writer (the MTS / item-trading-center
# "normal item result" dispatcher). Unlike the cash-shop enum, the CITC result
# mode enum is VERSION-STABLE: the switch (cases 0x15..0x3E) is byte-identical in
# gms_v83 (0x5a4311), gms_v87 (0x5d43d0), gms_v95 (0x5771d0) - IDA-verified.
# jms_v185 has no MTS_OPERATION op (registry-absent) - omitted.
#
# Atlas registers the MtsOperation writer but has no MTS feature emitting it yet;
# the codec is stubbed config-driven (resolves the mode from this table via
# WithResolvedCode), consistent with the other dispatcher families, so a future
# MTS implementation sends the version-correct mode for the chosen result key.

writer: MtsOperation
fname: CITC::OnNormalItemResult
op: MTS_OPERATION
direction: clientbound
operations:
