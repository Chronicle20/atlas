  - { key: UPDATE,                                                  modes: { gms_v83: 7,  gms_v84: 7,  gms_v87: 7,  gms_v95: 7,  jms_v185: 7 } }
  - { key: CREATED,                                                 modes: { gms_v83: 8,  gms_v84: 8,  gms_v87: 8,  gms_v95: 8,  jms_v185: 8 } }
  - { key: ALREADY_HAVE_JOINED_A_PARTY_1,                           modes: { gms_v83: 9,  gms_v84: 9,  gms_v87: 9,  gms_v95: 9,  jms_v185: 9 } }
  - { key: A_BEGINNER_CANT_CREATE_A_PARTY,                          modes: { gms_v83: 10, gms_v84: 10, gms_v87: 10, gms_v95: 10, jms_v185: 10 } }
  - { key: LEAVE,                                                   modes: { gms_v83: 12, gms_v84: 12, gms_v87: 12, gms_v95: 12, jms_v185: 12 } }
  - { key: DISBAND,                                                 modes: { gms_v83: 12, gms_v84: 12, gms_v87: 12, gms_v95: 12, jms_v185: 12 } }
  - { key: EXPEL,                                                   modes: { gms_v83: 12, gms_v84: 12, gms_v87: 12, gms_v95: 12, jms_v185: 12 } }
  - { key: YOU_HAVE_YET_TO_JOIN_A_PARTY,                            modes: { gms_v83: 13, gms_v84: 13, gms_v87: 13, gms_v95: 13, jms_v185: 13 } }
  - { key: JOIN,                                                    modes: { gms_v83: 15, gms_v84: 15, gms_v87: 15, gms_v95: 15, jms_v185: 15 } }
  # ALREADY_HAVE_JOINED_A_PARTY_2 / FULL_CAPACITY: v87/v95/jms SHIFT +1 vs v83/v84.
  #   StringPool-decrypt verified (task-105 Task 1b): "Already have joined a party."
  #   = v83/v84 case16 / v87 case17 (id329) / v95 case17 (id0x14C) / jms case17
  #   (id0x142). "...already in full capacity." = v83/v84 case17 / v87 case18
  #   (id332) / v95 case18 (id0x14F) / jms case18 (id0x147). The prior "all=16/17"
  #   was the byte-identical assumption; IDA text contradicts it for v87/v95/jms.
  - { key: ALREADY_HAVE_JOINED_A_PARTY_2,                           modes: { gms_v83: 16, gms_v84: 16, gms_v87: 17, gms_v95: 17, jms_v185: 17 } }
  - { key: THE_PARTY_YOURE_TRYING_TO_JOIN_IS_ALREADY_IN_FULL_CAPACITY, modes: { gms_v83: 17, gms_v84: 17, gms_v87: 18, gms_v95: 18, jms_v185: 18 } }
  # UNABLE_TO_FIND_THE_REQUESTED_CHARACTER_IN_THIS_CHANNEL: v83/v84 IDA case 19 =
  #   0x13 MODE-ONLY (client reads no name; current Go writes one — IDA wins).
  #   VERSION-ABSENT in v87/v95/jms: case 19/0x13 is an empty `return` and no other
  #   case decrypts to "Unable to find the requested character in this channel"
  #   (full enumeration: v87 @0xad697a, v95 @0xa10ab0, jms @0xb297e7).
  - { key: UNABLE_TO_FIND_THE_REQUESTED_CHARACTER_IN_THIS_CHANNEL,  modes: { gms_v83: 19, gms_v84: 19 } }  # version-absent: enumerated all cases @0xad697a/@0xa10ab0/@0xb297e7, none decrypt to 'Unable to find the requested character in this channel'
  # --- name-bearing invite-target notices (v83 cases 21/22/23 = 0x15/0x16/0x17,
  #     each reads a trailing CInPacket::DecodeStr name; VERSION-ABSENT in v87/v95/jms) ---
  - { key: IS_CURRENTLY_BLOCKING_ANY_PARTY_INVITATIONS,             modes: { gms_v83: 21, gms_v84: 21 } }  # version-absent: enumerated all cases @0xad697a/@0xa10ab0/@0xb297e7, none decrypt to "'%s' is currently blocking any party invitations."
  - { key: IS_TAKING_CARE_OF_ANOTHER_INVITATION,                   modes: { gms_v83: 22, gms_v84: 22 } }  # version-absent: enumerated all cases @0xad697a/@0xa10ab0/@0xb297e7, none decrypt to "'%s' is taking care of another invitation."
  - { key: HAVE_DENIED_REQUEST_TO_THE_PARTY,                       modes: { gms_v83: 23, gms_v84: 23 } }  # version-absent: enumerated all cases @0xad697a/@0xa10ab0/@0xb297e7, none decrypt to "'%s' have denied request to the party."
  # CANNOT_KICK: v83/v84 case25 (SP_5059); v87 case29 (id5070), v95 case29 (id0x13D5),
  #   jms case29 (id0x12CB) — all decrypt to "Cannot kick another user in this map".
  - { key: CANNOT_KICK_ANOTHER_USER_IN_THIS_MAP,                   modes: { gms_v83: 25, gms_v84: 25, gms_v87: 29, gms_v95: 29, jms_v185: 29 } }
  # CHANGE_LEADER: v83/v84 case27 (SP_4046/4047); v87 case31 (id4054/4055),
  #   v95 case31 (id0xFF7/0xFF8), jms case31 (id0xFF5/0xFF6) — leader-change.
  - { key: CHANGE_LEADER,                                          modes: { gms_v83: 27, gms_v84: 27, gms_v87: 31, gms_v95: 31, jms_v185: 31 } }
  # THIS_CAN_ONLY_BE_GIVEN: v83/v84 case28 (SP_4048); v87 case32 (id4056),
  #   v95 case32 (id0xFF9), jms case32 (id0xFF7) — "...within the vicinity".
