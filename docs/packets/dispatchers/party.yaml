  - { key: UNABLE_TO_FIND_THE_CHARACTER,                           modes: { gms_v83: 33, gms_v84: 33, gms_v87: 37, gms_v95: 37 } }  # version-absent jms_v185 only: no jms case 37; v95 case37 = id0x17B "Unable to find the character." (independent IDA re-verify, task-105 Task 1b)
