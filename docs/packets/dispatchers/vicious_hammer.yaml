# ViciousHammer - CField::OnItemUpgrade per-version mode table.
# The forwarder delegates to CUIItemUpgrade::OnPacket (v83 sub_82B2C3 via
# sub_82B2AD; v95 CUIItemUpgrade::OnItemUpgradeResult 0x7c0fd0, reached via
# CUIItemUpgrade::OnPacket 0x7c2e10 when nType==425). Terminal modes are
# hard-coded in the client and VERSION-DEPENDENT (IDA-verified: v83
# SUCCESS=61/FAILURE=62 @sub_82B2C3 0x82b2c3; v95 SUCCESS=65/FAILURE=66
# @CUIItemUpgrade::OnItemUpgradeResult 0x7c0fd0). OPEN is SERVER-CHOSEN: the
# client accepts any byte not in the terminal set for that version, stores it
# as m_nReturnResult, and echoes it back in ITEM_UPGRADE_UPDATE. Atlas fixes
# OPEN = 0 for all versions (task-129, design OQ-1).
# jms_v185 has no VICIOUS_HAMMER op (registry-absent) - omitted.
# gms_v92 has no registry/IDB/template routing - omitted.
writer: ViciousHammer
fname: CField::OnItemUpgrade
op: VICIOUS_HAMMER
direction: clientbound
operations:
  - { key: OPEN,    modes: { gms_v83: 0,  gms_v84: 0,  gms_v87: 0,  gms_v95: 0 } }
  - { key: SUCCESS, modes: { gms_v83: 61, gms_v84: 61, gms_v87: 61, gms_v95: 65 } }
  - { key: FAILURE, modes: { gms_v83: 62, gms_v84: 62, gms_v87: 62, gms_v95: 66 } }
