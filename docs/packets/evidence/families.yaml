  # CashItemMovedToCashInventory (MOVE_S_TO_L_DONE). Per-version arm bodies are
  # byte-identical in shape (version-shifted mode bytes + addresses only),
  # decompile-confirmed this session: v83 0x4794f6.., v84 0x47c694.. (dispatcher
  # CCashShop__OnCashItemResult_recv_0x14C@0x47c291), v87 0x4847f4 (dispatcher),
  # jms 0x48bcff.., v95 0x499370 (dispatcher). The remaining cases (gift/coupon/
