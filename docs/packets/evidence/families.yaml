  # arms of CASHSHOP_OPERATION have decompile-verified per-mode body codecs in
  # cash/clientbound (each writes the leading mode byte THEN the full arm body,
  # not mode-byte-only), each with a packet-audit:verify byte-fixture + fresh
  # pinned evidence across gms_v83/v84/v87/v95/jms_v185. Supported arms (synthetic
  # #-suffix FNames in the per-version exports): CashShopInventory (LOAD_LOCKER),
  # OperationError (LOAD_LOCKER_FAILED), WishList (LOAD/SET_WISH_DONE),
  # CashShopPurchaseSuccess (BUY_DONE), InventoryCapacitySuccess/Failed
