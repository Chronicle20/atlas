# Operation registry for gms_v48 (MAJOR 48). Anchor = gms_v61 (FName->Op dictionary).
# Built Stage B (task-113, Task 4.B): clientbound = `packet-audit discover-ops` switch-walk of the
# v48 IDB (GMS_v48_1_DEVM.exe, port 13337) joined to the gms_v61.yaml FName->Op dictionary;
# v48 opcodes are NON-uniformly shifted from v61 (login auth-result MOVED 0->1; CWvsContext window
# [0x18,0x47] starts Delta-1 and deepens; CField base region Delta~-20; CUserPool base 100). Manual
# entries are hand-decompiled cases the numeric switch-parser cannot reach (char-literal / vtable /
# range-router pool dispatch). Char-mgmt 13/14/15 carry body-canonical (v83) FNames keyed to the v48
# addresses (unnamed subs, no rotated symbol). Serverbound = v48 COutPacket(N) send-sites read from a
# global COutPacket-ctor (@0x57b77e) harvest; the delta-flagged CHANGE_CHANNEL/MOVE_PLAYER/WHISPER
# opcodes were BODY-verified from their send-sites (never blind-shifted from v61). CSV v48 column is
# placeholder (0x000). See discover_gms_v48.md +
# docs/tasks/task-113-gms-legacy-versions/v48-packet-delta.md.
#
# STATUS: clean PARTIAL (see discover_gms_v48.md "Remaining worklist"). Registered here = every
# body-verified / named-caller op across login, shim, CWvsContext (named + delta-resolved),
# CField base region, CUserPool spawn/leave, CCashShop (named), and the send-site-harvested +
# body-verified serverbound set. Deferred (kept OUT to keep the registry clean, listed in the
# worklist): the unnamed CWvsContext subs' v61 op-identity body-map, and the deep clientbound pool
# leaves (CUserPool common/remote/local internals, mob/npc/drop/reactor/dialog demuxers) — these
# need per-leaf body-walks the delta doc itself defers to Stage B/E. No opcode was fabricated.

