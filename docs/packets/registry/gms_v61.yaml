# Operation registry for gms_v61 (MAJOR 61). Anchor = gms_v72 (FName->Op dictionary).
# Built Stage B (task-113): clientbound = `packet-audit discover-ops` switch-walk of the
# v61 IDB (GMS_v61.1_U_DEVM.exe, port 13338) joined to the gms_v72.yaml FName->Op dictionary;
# v61 opcodes are non-uniformly shifted from v72 (login Δ0; CWvsContext 26-91 = v72 26-91 with
# the 81-100 block absent; CStage/CField Δ-22; map pools Δ-25..-33; cashshop Δ-36). Manual entries
# are hand-decompiled cases the numeric switch-parser cannot reach (char-literal / if-else / vtable /
# sibling-switch / dialog-region). Char-mgmt 13/14/15 carry body-canonical (v83) FNames (rotated IDB
# symbols; see delta doc f). Serverbound = v61 COutPacket(N) send-sites read per-handler (never
# blind-shifted). CSV v61 column is placeholder (0x000). See discover_gms_v61.md +
# docs/tasks/task-113-gms-legacy-versions/v61-packet-delta.md.
