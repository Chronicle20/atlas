# Operation registry for gms_v72 (MAJOR 72). Anchor = gms_v79 (delta = gms_v83).
# Built Stage B (task-113): clientbound = `packet-audit discover-ops` switch-walk of the
# v72 IDB (GMS_v72.1_U_DEVM.exe, port 13339) joined to the gms_v79.yaml FName->Op
# dictionary; the v72 opcode space is non-uniformly shifted from v79 (cb Δ 0/-4/-6/-8/-12,
# plus absent ops + the structurally-divergent CCashShop block). Manual entries are
# hand-decompiled IDB cases the numeric switch-parser cannot reach (char-literal / if-else /
# vtable / inlined / sibling-switch / dialog-region / KEYMAP+TV routing). Serverbound = v72
# COutPacket(N) send-sites read from a global COutPacket-ctor xref harvest of the v72 IDB;
# verified region deltas: login(<=23) delta0, mid/field/social(24-154) delta+1, deep(>=163) delta-2.
# Every opcode is read from the v72 IDB; see docs/packets/registry/discover_gms_v72.md and
# docs/tasks/task-113-gms-legacy-versions/v72-packet-delta.md. CSV v72 column is placeholder.
