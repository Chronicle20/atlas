# Built Stage B (task-113): clientbound = `packet-audit discover-ops` switch-walk of the
# v79 IDB (GMS_v79_1_DEVM.exe) joined to the v83 FName->Op dictionary; manual entries are
# hand-decompiled IDB cases the numeric switch-parser cannot reach (char-literal / if-else /
# vtable / inlined / sibling-switch). Serverbound = verified v79 COutPacket(N) send-sites.
# Every opcode is read from the v79 IDB; see docs/packets/registry/discover_gms_v79.md and
# docs/tasks/task-113-gms-legacy-versions/v79-packet-delta.md. CSV v79 column is placeholder.
