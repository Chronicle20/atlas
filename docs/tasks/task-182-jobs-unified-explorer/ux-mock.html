<title>Jobs Page — UX Exploration</title>
<style>
  /* ============ Nord theme tokens, replicated from atlas-ui src/index.css ============ */
  .app {
    --background: 218 27% 94%;
    --foreground: 220 16% 22%;
    --card: 218 27% 94%;
    --card-foreground: 220 16% 22%;
    --popover: 218 27% 94%;
    --popover-foreground: 220 16% 22%;
    --primary: 220.9 39.3% 11%;
    --primary-foreground: 210 20% 98%;
    --secondary: 220 14.3% 95.9%;
    --secondary-foreground: 220.9 39.3% 11%;
    --muted: 220 14.3% 95.9%;
    --muted-foreground: 220 8.9% 46.1%;
    --accent: 220 14.3% 95.9%;
    --accent-foreground: 220.9 39.3% 11%;
    --border: 219 28% 88%;
    --input: 220 13% 91%;
    --ring: 220 16% 22%;
    --radius: 0.5rem;
    --sidebar-background: 218 27% 92%;
    --sidebar-foreground: 240 5.3% 26.1%;
    --sidebar-primary: 220 16% 28%;
    --sidebar-primary-foreground: 218 27% 92%;
    --sidebar-accent: 240 4.8% 95.9%;
    --sidebar-accent-foreground: 220 16% 28%;
    --sidebar-border: 220 13% 91%;
    /* Branch accents from the Nord aurora/frost palette (darkened for light bg) */
    --c-warrior: 354 42% 48%;
    --c-magician: 213 32% 44%;
    --c-bowman: 92 28% 38%;
    --c-thief: 311 20% 45%;
    --c-pirate: 14 51% 46%;
    --c-cygnus: 40 71% 38%;
    --c-aran: 193 43% 38%;
    --c-evan: 179 25% 38%;
    --c-special: 210 34% 44%;
    --acc-fg: 210 20% 98%;
  }
  .app.dark {
    --background: 220 16% 22%;
    --foreground: 210 20% 98%;
    --card: 220 16% 22%;
    --card-foreground: 210 20% 98%;
    --popover: 220 16% 22%;
    --popover-foreground: 210 20% 98%;
    --primary: 210 20% 98%;
    --primary-foreground: 220.9 39.3% 11%;
    --secondary: 215 27.9% 16.9%;
    --secondary-foreground: 210 20% 98%;
    --muted: 215 27.9% 16.9%;
    --muted-foreground: 217.9 10.6% 64.9%;
    --accent: 215 27.9% 16.9%;
    --accent-foreground: 210 20% 98%;
    --border: 215 27.9% 16.9%;
    --input: 215 27.9% 16.9%;
    --ring: 216 12.2% 83.9%;
    --sidebar-background: 220 16% 28%;
    --sidebar-foreground: 240 4.8% 95.9%;
    --sidebar-primary: 224.3 76.3% 48%;
    --sidebar-primary-foreground: 0 0% 100%;
    --sidebar-accent: 240 3.7% 15.9%;
    --sidebar-accent-foreground: 240 4.8% 95.9%;
    --sidebar-border: 240 3.7% 15.9%;
    /* Nord originals read well on the dark ground */
    --c-warrior: 354 42% 56%;
    --c-magician: 213 32% 63%;
    --c-bowman: 92 28% 65%;
    --c-thief: 311 20% 63%;
    --c-pirate: 14 51% 63%;
    --c-cygnus: 40 71% 73%;
    --c-aran: 193 43% 67%;
    --c-evan: 179 25% 65%;
    --c-special: 210 34% 63%;
    --acc-fg: 220 16% 22%;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { overflow: hidden; }
  .app {
    display: flex; height: 100vh; overflow: hidden;
    background: hsl(var(--background)); color: hsl(var(--foreground));
    font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; text-align: left; }
  input { font: inherit; color: inherit; }
  svg { flex: none; }
  :is(button, input, [tabindex]):focus-visible {
    outline: 2px solid hsl(var(--ring) / .5); outline-offset: 1px; border-radius: 4px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }

  /* ============ sidebar (shadcn Sidebar replica) ============ */
  .sidebar {
    width: 16rem; flex: none; display: flex; flex-direction: column;
    background: hsl(var(--sidebar-background)); color: hsl(var(--sidebar-foreground));
    border-right: 1px solid hsl(var(--sidebar-border));
    transition: margin-left .2s ease;
  }
  .app.sb-collapsed .sidebar { margin-left: -16rem; }
  .sb-header { padding: 8px; }
  .logo-box { height: 210px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
  .logo-mark {
    width: 96px; height: 96px; border-radius: 24px;
    background: hsl(var(--sidebar-primary)); color: hsl(var(--sidebar-primary-foreground));
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; font-weight: 700; letter-spacing: -0.03em;
  }
  .logo-word { font-size: 18px; font-weight: 650; letter-spacing: .12em; text-transform: uppercase; }

  .tenant-switch { position: relative; }
  .tenant-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px; border-radius: calc(var(--radius) - 2px);
    border: 1px solid hsl(var(--sidebar-border)); background: hsl(var(--background));
  }
  .tenant-btn:hover { background: hsl(var(--accent)); }
  .tenant-ico {
    width: 32px; height: 32px; border-radius: 8px; flex: none;
    background: hsl(var(--sidebar-primary)); color: hsl(var(--sidebar-primary-foreground));
    display: flex; align-items: center; justify-content: center;
  }
  .tenant-btn .t-name { font-weight: 600; font-size: 13.5px; line-height: 1.2; }
  .tenant-btn .t-sub { font-size: 11.5px; color: hsl(var(--muted-foreground)); }
  .tenant-btn .updown { margin-left: auto; color: hsl(var(--muted-foreground)); }
  .tenant-menu {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 30;
    background: hsl(var(--popover)); color: hsl(var(--popover-foreground));
    border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius) - 2px);
    box-shadow: 0 4px 12px rgb(0 0 0 / .12); padding: 4px;
  }
  .tenant-menu[hidden] { display: none; }
  .tenant-menu button {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 6px 8px; border-radius: 6px; font-size: 13px;
  }
  .tenant-menu button:hover { background: hsl(var(--accent)); }
  .tenant-menu button .chk { margin-left: auto; visibility: hidden; }
  .tenant-menu button[aria-checked="true"] .chk { visibility: visible; }

  .sb-content { flex: 1; overflow-y: auto; padding: 8px; }
  .sb-sep { height: 1px; background: hsl(var(--sidebar-border)); margin: 8px 8px; }
  .sb-group-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px; border-radius: calc(var(--radius) - 2px); font-size: 14px;
  }
  .sb-group-btn:hover { background: hsl(var(--sidebar-accent)); color: hsl(var(--sidebar-accent-foreground)); }
  .sb-group-btn .grid { display: grid; flex: 1; line-height: 1.25; }
  .sb-group-btn .cap { font-size: 12px; color: hsl(var(--muted-foreground)); }
  .sb-group-btn .chev { margin-left: auto; color: hsl(var(--muted-foreground)); transition: transform .15s; }
  .sb-group[data-open="true"] .sb-group-btn .chev { transform: rotate(90deg); }
  .sb-sub { display: none; margin: 2px 0 4px 14px; padding: 0 0 0 10px; border-left: 1px solid hsl(var(--sidebar-border)); }
  .sb-group[data-open="true"] .sb-sub { display: block; }
  .sb-sub a {
    display: block; padding: 6px 8px; border-radius: calc(var(--radius) - 2px);
    font-size: 13.5px; color: inherit; text-decoration: none; cursor: pointer;
  }
  .sb-sub a:hover { background: hsl(var(--sidebar-accent)); color: hsl(var(--sidebar-accent-foreground)); }
  .sb-sub a.active { background: hsl(var(--sidebar-accent)); color: hsl(var(--sidebar-accent-foreground)); font-weight: 500; }

  /* ============ main / header (AppShell replica) ============ */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; padding-top: 8px; }
  .topbar { height: 48px; flex: none; display: flex; align-items: center; gap: 8px; padding: 0 8px; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: hsl(var(--foreground));
  }
  .icon-btn:hover { background: hsl(var(--accent)); }
  .topbar .vsep { width: 1px; height: 16px; background: hsl(var(--border)); margin-right: 8px; }
  .crumbs { font-size: 14px; color: hsl(var(--foreground)); }
  .topbar .right { margin-left: auto; }
  .content-outer { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 0 8px 8px; }
  .content {
    flex: 1; min-height: 0; display: flex; flex-direction: column;
    border-radius: 12px; background: hsl(var(--sidebar-background)); overflow: hidden;
  }

  /* ============ Jobs page ============ */
  .page { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 16px; padding: 28px 40px 24px; }
  .page-head { display: flex; align-items: baseline; gap: 8px; flex: none; }
  .page-head h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.025em; margin: 0; display: flex; align-items: center; gap: 8px; }
  .page-head .note { font-size: 12px; color: hsl(var(--muted-foreground)); margin-left: 10px; }

  .card {
    background: hsl(var(--card)); color: hsl(var(--card-foreground));
    border: 1px solid hsl(var(--border)); border-radius: 12px;
    box-shadow: 0 1px 2px rgb(0 0 0 / .05);
    display: flex; flex-direction: column; min-height: 0;
  }
  .card-title {
    font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
    padding: 14px 16px 10px; flex: none;
  }

  .explorer {
    flex: 1; min-height: 0;
    display: grid; grid-template-columns: 200px minmax(340px, 1fr) minmax(480px, 42%); gap: 14px;
  }
  @media (max-width: 1150px) { .explorer { grid-template-columns: 200px minmax(0, 1fr); } .detail-card { display: none; } }

  /* --- branches rail --- */
  .rail-scroll { overflow-y: auto; padding: 0 8px 10px; }
  .rail-group h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em;
    color: hsl(var(--muted-foreground)); margin: 10px 8px 4px;
  }
  .rail-item {
    display: flex; align-items: center; gap: 9px; width: 100%;
    padding: 6px 8px; border-radius: calc(var(--radius) - 2px); font-size: 13.5px;
  }
  .rail-item:hover { background: hsl(var(--accent)); }
  .rail-item[aria-pressed="true"] { background: hsl(var(--acc) / .14); font-weight: 550; }
  .rail-item .dot { width: 9px; height: 9px; border-radius: 3px; background: hsl(var(--acc)); flex: none; }
  .rail-item .n { margin-left: auto; font-size: 11.5px; color: hsl(var(--muted-foreground)); font-variant-numeric: tabular-nums; }

  /* --- middle: advancement + skills --- */
  .mid-card { display: flex; flex-direction: column; min-height: 0; }
  .flow-wrap { flex: none; padding: 0 16px 14px; border-bottom: 1px solid hsl(var(--border)); }
  .flow-scroll { overflow-x: auto; padding-bottom: 2px; }
  /* Tier-aligned grid: implicit auto columns size to the widest chip per tier,
     sibling cells stretch to match, so 2nd/3rd/4th jobs line up vertically. */
  .flowgrid { display: grid; width: max-content; margin: 0 auto; column-gap: 4px; row-gap: 6px; }
  .fcell { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  .fcell.anchor { align-self: center; }
  .fcell:not(.anchor) .chip { flex: 1; justify-content: center; }
  .sep { color: hsl(var(--muted-foreground) / .55); flex: none; margin: 0 1px; }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius) - 2px);
    background: hsl(var(--card)); padding: 4px 10px;
    font-size: 13px; font-weight: 500; white-space: nowrap;
    transition: border-color .1s, background .1s;
  }
  .chip:hover { border-color: hsl(var(--acc)); }
  .chip.sel { background: hsl(var(--acc)); border-color: hsl(var(--acc)); color: hsl(var(--acc-fg)); font-weight: 550; }
  .chip .tier {
    font-size: 10px; font-weight: 600; letter-spacing: .04em;
    color: hsl(var(--muted-foreground)); background: hsl(var(--secondary));
    border-radius: 4px; padding: 1px 4px;
  }
  .chip.sel .tier { background: hsl(var(--acc-fg) / .22); color: hsl(var(--acc-fg)); }

  .skl { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .skl-head { flex: none; display: flex; align-items: center; gap: 12px; padding: 12px 16px 8px; }
  .skl-head h4 { font-size: 13px; font-weight: 600; margin: 0; color: hsl(var(--muted-foreground)); }
  .search {
    margin-left: auto; display: flex; align-items: center; gap: 7px;
    border: 1px solid hsl(var(--input)); border-radius: calc(var(--radius) - 2px);
    background: transparent; padding: 4px 10px; box-shadow: 0 1px 2px rgb(0 0 0 / .05);
  }
  .search svg { color: hsl(var(--muted-foreground)); }
  .search input { border: none; outline: none; background: none; width: 150px; font-size: 13px; }
  .search input::placeholder { color: hsl(var(--muted-foreground)); }
  .skl-list { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
  .srow {
    display: flex; align-items: center; gap: 11px; width: 100%;
    padding: 7px 9px; border-radius: calc(var(--radius) - 2px);
  }
  .srow:hover { background: hsl(var(--accent)); }
  .srow[aria-pressed="true"] { background: hsl(var(--acc) / .13); }
  .tile {
    width: 32px; height: 32px; border-radius: 8px; flex: none;
    display: flex; align-items: center; justify-content: center;
    background: hsl(var(--acc) / .14); color: hsl(var(--acc));
  }
  .srow .nm { font-weight: 550; font-size: 13.5px; }
  .srow .id { font-family: ui-monospace, "Cascadia Mono", Menlo, monospace; font-size: 11px; color: hsl(var(--muted-foreground)); }
  .srow .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .badge {
    font-size: 11px; font-weight: 600;
    background: hsl(var(--secondary)); color: hsl(var(--secondary-foreground));
    border-radius: calc(var(--radius) - 4px); padding: 2px 8px; white-space: nowrap;
  }
  .badge.outline { background: transparent; border: 1px solid hsl(var(--border)); color: hsl(var(--muted-foreground)); }
  .mlv { font-size: 12px; color: hsl(var(--muted-foreground)); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .skl-empty { padding: 34px 20px; text-align: center; color: hsl(var(--muted-foreground)); font-size: 13.5px; }

  /* --- detail card --- */
  .detail-card { overflow: hidden; }
  .detail-scroll { flex: 1; overflow-y: auto; }
  .detail { padding: 4px 16px 18px; }
  .d-head { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
  .d-head .tile { width: 42px; height: 42px; border-radius: 10px; }
  .d-head h5 { font-size: 16px; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
  .d-id { font-family: ui-monospace, "Cascadia Mono", Menlo, monospace; font-size: 11.5px; color: hsl(var(--muted-foreground)); }
  .d-chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 10px; }
  .desc { font-size: 13.5px; margin: 0 0 14px; max-width: 60ch; }
  .lvl-box {
    border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius));
    padding: 12px 13px; background: hsl(var(--sidebar-background));
  }
  .lvl-box .l-top { display: flex; align-items: baseline; gap: 7px; margin-bottom: 6px; }
  .lvl-box .l-top b { font-size: 13px; font-weight: 650; }
  .lvl-box .l-top span { font-size: 12px; color: hsl(var(--muted-foreground)); font-variant-numeric: tabular-nums; }
  .lvl-box input[type="range"] { width: 100%; accent-color: hsl(var(--acc)); margin: 2px 0 10px; }
  .statgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; }
  .statgrid .st { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; }
  .statgrid .st .k { color: hsl(var(--muted-foreground)); }
  .statgrid .st .v { font-weight: 550; font-variant-numeric: tabular-nums; }
  .alltbl { margin-top: 12px; }
  .alltbl summary {
    cursor: pointer; font-size: 12.5px; font-weight: 550; color: hsl(var(--muted-foreground));
    list-style: none; display: flex; align-items: center; gap: 6px;
  }
  .alltbl summary::before { content: "▸"; transition: transform .12s; font-size: 11px; }
  .alltbl[open] summary::before { transform: rotate(90deg); }
  .tbl-scroll { overflow-x: auto; margin-top: 8px; border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius) - 2px); }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th, td { padding: 5px 11px; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  thead th {
    font-size: 11px; text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
    color: hsl(var(--muted-foreground)); background: hsl(var(--secondary));
    border-bottom: 1px solid hsl(var(--border)); position: sticky; top: 0;
  }
  tbody tr:nth-child(even) { background: hsl(var(--secondary) / .55); }
  tbody tr.hl { background: hsl(var(--acc) / .14); }
  .detail-empty { padding: 56px 24px; text-align: center; color: hsl(var(--muted-foreground)); font-size: 13.5px; }
  .detail-empty svg { color: hsl(var(--border)); margin-bottom: 10px; }
</style>

<div class="app" id="app">
  <!-- ============ sidebar ============ -->
  <aside class="sidebar">
    <div class="sb-header">
      <div class="logo-box">
        <div class="logo-mark">A</div>
        <div class="logo-word">Atlas</div>

      <div class="tenant-switch">
        <button class="tenant-btn" id="tenantBtn" aria-haspopup="listbox">

          <div class="explorer">

<script>
/* ============ data (graph from job-advancement-tree.ts; GM line reparented per in-game presentation) ============ */
const JOB_GRAPH = {

const BRANCH_FLOORS = {0:1, 800:83, 1000:83, 2000:80, 2001:84};
const NODE_FLOORS = {500:62};

function childrenOf(id){
  return Object.keys(JOB_GRAPH).map(Number).filter(k => JOB_GRAPH[k].parent === id).sort((a,b)=>a-b);
}
function floorOf(id){
  let cur = id, floor = 0;
  while (cur != null && JOB_GRAPH[cur]) {
    if (NODE_FLOORS[cur] !== undefined && NODE_FLOORS[cur] > floor) floor = NODE_FLOORS[cur];
    const p = JOB_GRAPH[cur].parent;
    if (p == null) { const rf = BRANCH_FLOORS[cur] ?? 0; if (rf > floor) floor = rf; break; }
    cur = p;
  }
  return floor;
}
function pathOf(id){
  const p = []; let cur = id;
  while (cur != null && JOB_GRAPH[cur]) { p.unshift(cur); cur = JOB_GRAPH[cur].parent; }
  return p;
}
function chainsFrom(id){
  const kids = childrenOf(id);
  if (!kids.length) return [[]];
  const out = [];
  for (const k of kids) for (const rest of chainsFrom(k)) out.push([k, ...rest]);
  return out;
}
function ord(n){ return n + (n===1?"st":n===2?"nd":n===3?"rd":"th"); }
function nodeCount(id){ return 1 + childrenOf(id).reduce((n,k)=>n+nodeCount(k),0); }

];
function branchEntryOf(jobId){
  const path = pathOf(jobId);
  for (const g of RAIL_GROUPS) for (const e of g.entries) if (path.includes(e.id)) return e;
  return RAIL_GROUPS[0].entries[0];
}

  chains.forEach((chain, r) => {

}
function renderDetail(){
  const el = document.getElementById("detail");
  const skill = S.skill;
  if (!skill) {
    el.innerHTML = `<div class="detail-empty">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 3l2.1 4.9L19 9l-4 3.4 1.2 5.1L12 14.8 7.8 17.5 9 12.4 5 9l4.9-1.1z"/></svg>
      <div>Select a skill to inspect it</div></div>`;
    return;
  }
  const lv = Math.min(S.levelState.level ?? 1, skill.master);
  S.levelState.level = lv;
  const rows = skill.stats.map(([label, f]) =>
    `<div class="st"><span class="k">${esc(label)}</span><span class="v">${fmt(f(lv))}</span></div>`).join("");
  let tableHtml = "";
  if (skill.stats.length) {
    const head = `<tr><th>Level</th>${skill.stats.map(([l]) => `<th>${esc(l)}</th>`).join("")}</tr>`;
    let body = "";
    for (let i = 1; i <= skill.master; i++) {
      body += `<tr class="${i===lv?'hl':''}"><td>${i}</td>${skill.stats.map(([,f]) => `<td>${fmt(f(i))}</td>`).join("")}</tr>`;
    }
    tableHtml = `<details class="alltbl" open><summary>All ${skill.master} levels</summary>
      <div class="tbl-scroll"><table><thead>${head}</thead><tbody>${body}</tbody></table></div></details>`;
  }
  el.innerHTML = `<div class="detail" style="--acc:${accVar(S.entry)}">
    <div class="d-head">
      <span class="tile">${ICONS[skill.type]}</span>
      <div><h5>${esc(skill.name)}</h5><span class="d-id">ID ${skill.id}</span></div>
    </div>
    <div class="d-chips">
      <span class="badge">${skill.type}</span>
      <span class="badge">Master Lv ${skill.master}</span>
      <span class="badge outline" title="Values in this mock are illustrative">sample values</span>
    </div>
    <p class="desc">${esc(skill.desc)}</p>
    ${skill.stats.length ? `<div class="lvl-box">
      <div class="l-top"><b>Level ${lv}</b><span>/ ${skill.master}</span></div>
      <input type="range" min="1" max="${skill.master}" value="${lv}" aria-label="Skill level">
      <div class="statgrid">${rows}</div>
    </div>` : `<p class="desc" style="color:hsl(var(--muted-foreground))">No per-level data.</p>`}
    ${tableHtml}`;
  const slider = el.querySelector('input[type="range"]');
  if (slider) slider.addEventListener("input", () => {
    S.levelState.level = Number(slider.value);
    renderDetail();
    el.querySelector('input[type="range"]').focus();
  });
}
function render(){ renderRail(); renderFlow(); renderSkillList(); renderDetail(); }
document.getElementById("search").addEventListener("input", ev => { S.filter = ev.target.value; renderSkillList(); });

/* ============ chrome behaviors ============ */
const appEl = document.getElementById("app");
document.getElementById("sbToggle").addEventListener("click", () => appEl.classList.toggle("sb-collapsed"));

function setDark(dark){
  appEl.classList.toggle("dark", dark);
  document.getElementById("sunIco").style.display = dark ? "none" : "";
  document.getElementById("moonIco").style.display = dark ? "" : "none";
  document.body.style.background = dark ? "hsl(220 16% 22%)" : "hsl(218 27% 94%)";
}
document.getElementById("themeToggle").addEventListener("click", () => setDark(!appEl.classList.contains("dark")));
/* follow the artifact viewer's theme (data-theme on <html>) and OS preference */
function viewerDark(){
  const t = document.documentElement.dataset.theme;
  if (t) return t === "dark";
  return window.matchMedia("(prefers-color-scheme: dark)").matches;
}
new MutationObserver(() => setDark(viewerDark()))
  .observe(document.documentElement, {attributes: true, attributeFilter: ["data-theme"]});
setDark(viewerDark());

/* ============ init ============ */
renderSidebar();
renderTenantMenu();
S.skill = SKILLS[100].find(s => s.id === 1001004); /* Power Strike pre-selected */
render();
</script>
