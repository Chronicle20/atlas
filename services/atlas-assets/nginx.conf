worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Atlas tenant headers (TENANT_ID, MAJOR_VERSION, MINOR_VERSION) contain
  # underscores. nginx silently drops underscore-bearing headers by default.
  # Set globally so the directive applies to the server block included below.
  underscores_in_headers on;

  # Cluster DNS (k3s default 10.43.0.10) for runtime upstream resolution.
  # nginx requires `resolver` when proxy_pass contains variables — bare
  # hostname forms fail config-load (it tries to resolve them via libc and
  # bare cluster DNS hostnames aren't reachable from outside the cluster).
  # Validity 30s avoids excessive lookups while picking up service IP
  # changes within a minute.
  resolver 10.43.0.10 valid=30s ipv6=off;

  # Server block lives in /etc/nginx/conf.d/default.conf, produced at pod
  # startup by the upstream nginx image's envsubst entrypoint from
  # /etc/nginx/templates/default.conf.template. That step expands
  # ${POD_NAMESPACE} (downward-API-injected) so the proxy_pass FQDN to
  # atlas-wz-extractor matches the namespace the pod is actually running in.
  # Pre-2026-05 the namespace was a single `atlas`; the ArgoCD migration
  # split it into `atlas-main` and per-PR `atlas-pr-<N>`, breaking the
  # baked-in literal FQDN that this template now replaces.
  include /etc/nginx/conf.d/*.conf;
}
