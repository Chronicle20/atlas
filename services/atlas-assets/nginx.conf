worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Cluster DNS (k3s default 10.43.0.10) for runtime upstream resolution.
  # nginx requires `resolver` when proxy_pass contains variables — bare hostname
  # forms fail config-load (it tries to resolve them via libc and bare cluster
  # DNS hostnames aren't reachable from outside the cluster). Validity 30s
  # avoids excessive lookups while picking up service IP changes within a minute.
  resolver 10.43.0.10 valid=30s ipv6=off;

  server {
    listen       8080;
    server_name  _;

    # Atlas tenant headers (TENANT_ID, MAJOR_VERSION, MINOR_VERSION) contain
    # underscores. nginx silently drops underscore-bearing headers by default.
    underscores_in_headers on;

    root /usr/assets;

    # Character renders: try the cached PNG, fall back to atlas-wz-extractor on miss.
    location ~ "^/(?<ctenant>[^/]+)/(?<cregion>[^/]+)/(?<cver>[^/]+)/character/(?<chash>[a-f0-9]{16})\.png$" {
      try_files $uri @character_render;
      add_header Access-Control-Allow-Origin *;
      add_header Cache-Control "public, max-age=86400, immutable";
    }

    location @character_render {
      # FQDN required: nginx's resolver does not apply /etc/resolv.conf's
      # `search` domain expansion the way libc does, so a bare `atlas-wz-extractor`
      # gets "Host not found" from cluster DNS.
      proxy_pass http://atlas-wz-extractor.atlas.svc.cluster.local:8080/api/wz/character/render/$ctenant/$cregion/$cver/$chash.png$is_args$args;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }

    location / {
      try_files $uri =404;

      add_header Access-Control-Allow-Origin *;
      add_header Cache-Control "public, max-age=86400";
    }
  }
}
